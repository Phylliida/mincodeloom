<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Minimal Tool Chat UI</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: "SF Mono", "Consolas", "Liberation Mono", monospace;
      }
      body {
        margin: 0;
        padding: 16px;
        background: #020617;
        color: #e5e7eb;
      }
      h1, h2 {
        margin: 0 0 10px 0;
      }
      .grid {
        display: grid;
        gap: 14px;
      }
      .card {
        background: #0f172a;
        border: 1px solid #334155;
        padding: 12px;
        border-radius: 8px;
      }
      label {
        display: block;
        margin: 6px 0;
      }
      input, textarea, button {
        width: 100%;
        box-sizing: border-box;
        font: inherit;
      }
      input, textarea {
        border: 1px solid #334155;
        border-radius: 6px;
        padding: 8px;
        background: #020617;
        color: #e5e7eb;
      }
      textarea:not(#chat_input) {
        min-height: 120px;
      }
      button {
        border: 1px solid #475569;
        border-radius: 6px;
        background: #1e293b;
        color: #f8fafc;
        padding: 10px;
        cursor: pointer;
      }
      button.secondary {
        background: #0f172a;
        color: #e5e7eb;
      }
      .row {
        display: grid;
        gap: 8px;
        grid-template-columns: 1fr 1fr;
      }
      .checkbox-grid {
        display: grid;
        gap: 6px;
        margin-top: 8px;
        grid-template-columns: 1fr 1fr;
      }
      .checkbox-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 0;
      }
      .checkbox-row input {
        width: auto;
      }
      .mcp-server {
        border: 1px solid #334155;
        border-radius: 6px;
        padding: 8px;
        margin: 6px 0;
        background: #020617;
      }
      .mcp-server-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }
      .mcp-server-header strong {
        flex: 1;
      }
      .pill {
        display: inline-block;
        margin: 3px 6px 3px 0;
        border: 1px solid #334155;
        border-radius: 999px;
        padding: 2px 8px;
        font-size: 12px;
        background: #111827;
      }
      .tool-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin: 4px 0;
      }
      .tool-remove {
        width: auto;
        padding: 4px 8px;
        font-size: 12px;
        background: #7f1d1d;
        border-color: #991b1b;
      }
      pre {
        white-space: pre-wrap;
        word-break: break-word;
        border: 1px solid #334155;
        border-radius: 6px;
        background: #020617;
        padding: 8px;
      }
      #chat-log {
        max-height: 75vh;
        overflow-y: auto;
        border: 1px solid #334155;
        border-radius: 6px;
        background: #020617;
        padding: 6px;
      }
      .msg {
        border: 1px solid #1e293b;
        border-radius: 4px;
        margin: 3px 0;
        padding: 4px 8px;
        position: relative;
      }
      .msg-copy {
        position: absolute;
        top: 4px;
        right: 4px;
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 4px;
        color: #94a3b8;
        cursor: pointer;
        width: 24px;
        height: 24px;
        padding: 3px;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        transition: opacity 0.15s;
        user-select: none;
        -webkit-user-select: none;
      }
      .msg:hover .msg-copy { opacity: 1; }
      .msg-copy:hover { color: #e5e7eb; background: #334155; }
      .msg-label {
        font-size: 10px;
        color: #64748b;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .msg-body {
        margin: 2px 0 0 0;
        white-space: pre-wrap;
        word-break: break-word;
        border: none;
        background: transparent;
        padding: 0;
        font: inherit;
      }
      .msg-user { border-left: 3px solid #3b82f6; }
      .msg-assistant { border-left: 3px solid #22c55e; }
      .msg-thinking { border-left: 3px solid #6366f1; color: #64748b; font-style: italic; }
      .msg-tool-call { border-left: 3px solid #f59e0b; font-size: 12px; }
      .msg-tool { border-left: 3px solid #6b7280; font-size: 12px; }
      .msg-system { border-left: 3px solid #8b5cf6; }
      .hl-kw { color: #c678dd; }
      .hl-type { color: #e5c07b; }
      .hl-str { color: #98c379; }
      .hl-num { color: #d19a66; }
      .hl-comment { color: #5c6370; font-style: italic; }
      .hl-attr { color: #56b6c2; }
      .hl-lifetime { color: #56b6c2; }
      .hl-macro { color: #61afef; }
      .hl-linenum { color: #4b5563; }
      .msg-diff { margin: 4px 0; }
      .diff-file { font-size: 11px; color: #94a3b8; margin-bottom: 2px; }
      .diff-del, .diff-add {
        margin: 0;
        padding: 2px 6px;
        white-space: pre-wrap;
        word-break: break-word;
        font: inherit;
        border: none;
      }
      .diff-del { background: #1c0a0a; border-left: 2px solid #ef4444; color: #fca5a5; }
      .diff-add { background: #0a1c0a; border-left: 2px solid #22c55e; color: #86efac; }
      .diff-ctx { background: transparent; border-left: 2px solid #334155; color: #94a3b8; }
      .diff-section-label { font-size: 10px; color: #64748b; margin: 4px 0 1px 0; text-transform: uppercase; letter-spacing: 0.5px; }
      .msg-params { font-size: 11px; margin: 2px 0; white-space: pre-wrap; word-break: break-word; }
      .msg-raw { margin-top: 4px; }
      .msg-raw summary { font-size: 10px; color: #475569; cursor: pointer; }
      .msg-raw pre { margin: 2px 0 0 0; font-size: 11px; max-height: 200px; overflow-y: auto; }
      #send-btn {
        width: 36px;
        min-width: 36px;
        padding: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      details.card > summary {
        cursor: pointer;
        list-style: none;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      details.card > summary::before {
        content: "\25b6";
        font-size: 10px;
        transition: transform 0.15s;
      }
      details.card[open] > summary::before {
        transform: rotate(90deg);
      }
      details.card > summary h2 {
        margin: 0;
      }
      .meta {
        font-size: 12px;
      }
      .nav-bar {
        display: flex;
        align-items: center;
        gap: 8px;
        position: sticky;
        top: 0;
        z-index: 100;
        background: #020617;
        padding: 8px 0;
        margin-bottom: 10px;
      }
      .nav-bar h1 {
        margin: 0;
        flex: 1;
      }
      .nav-btn {
        width: auto;
        padding: 4px 12px;
        font-size: 18px;
        line-height: 1;
        background: #1e293b;
        border: 1px solid #475569;
        border-radius: 6px;
        color: #f8fafc;
        cursor: pointer;
      }
      .nav-btn:disabled {
        opacity: 0.3;
        cursor: default;
      }
      .nav-btn-bold {
        width: auto;
        padding: 4px 12px;
        font-size: 18px;
        font-weight: bold;
        line-height: 1;
        background: #334155;
        border: 1px solid #64748b;
        border-radius: 6px;
        color: #f8fafc;
        cursor: pointer;
      }
      .chat-input-bar {
        position: sticky;
        bottom: 0;
        z-index: 100;
        background: #020617;
        padding: 8px 0;
      }
      @media (max-width: 800px) {
        .row {
          grid-template-columns: 1fr;
        }
        .checkbox-grid {
          grid-template-columns: 1fr;
        }
        #chat-log {
          max-height: 60vh;
        }
      }
    </style>
  </head>
  <body>
    <div class="nav-bar">
      <button class="nav-btn" id="nav-left" type="button" disabled>&larr;</button>
      <button class="nav-btn nav-btn-bold" id="nav-turn-up" type="button" disabled>&uArr;</button>
      <button class="nav-btn" id="nav-up" type="button" disabled>&uarr;</button>
      <h1>Vibe Loom</h1>
      <button class="nav-btn" id="nav-down" type="button" disabled>&darr;</button>
      <button class="nav-btn nav-btn-bold" id="nav-turn-down" type="button" disabled>&dArr;</button>
      <button class="nav-btn" id="nav-right" type="button" disabled>&rarr;</button>
    </div>
    <div class="meta" id="meta"></div>
    <div class="grid">
      <details class="card" id="config-section">
        <summary><h2>Config</h2></summary>
        <form id="config-form">
          <label>
            Base URL
            <input id="base_url" required>
          </label>
          <label>
            API Key
            <input id="api_key" placeholder="optional">
          </label>
          <label>
            Workspace Path
            <input id="workspace_path" placeholder="/path/to/project">
          </label>
          <label>
            Model
            <input id="model" required>
          </label>
          <div class="checkbox-grid">
            <label class="checkbox-row">
              <input id="builtin_pwd" type="checkbox">
              <span>Enable pwd tool</span>
            </label>
            <label class="checkbox-row">
              <input id="builtin_ls" type="checkbox">
              <span>Enable ls tool</span>
            </label>
            <label class="checkbox-row">
              <input id="builtin_rg" type="checkbox">
              <span>Enable rg tool</span>
            </label>
            <label class="checkbox-row">
              <input id="builtin_rg_files" type="checkbox">
              <span>Enable rg_files tool</span>
            </label>
            <label class="checkbox-row">
              <input id="builtin_browse" type="checkbox">
              <span>Enable browse tool</span>
            </label>
            <label class="checkbox-row">
              <input id="builtin_read_file" type="checkbox">
              <span>Enable read_file tool</span>
            </label>
            <label class="checkbox-row">
              <input id="builtin_file_edit" type="checkbox">
              <span>Enable file_edit tool</span>
            </label>
          </div>
          <div class="meta"><code>browse</code> uses <code>path</code> as string-array segments.</div>
        </form>

        <h2 style="margin-top:12px">Display</h2>
        <label class="checkbox-row">
          <input id="virtual_scroll" type="checkbox" checked>
          <span>Virtual scroll (only render visible messages)</span>
        </label>

        <h2 style="margin-top:12px">MCP Servers</h2>
        <div id="mcp-list"></div>
        <form id="mcp-add-form">
          <div class="row">
            <label>
              Name
              <input id="mcp_name" placeholder="verus" required>
            </label>
            <label>
              Command
              <input id="mcp_command" placeholder="/path/to/mcp-server" required>
            </label>
          </div>
          <label>
            Args (space-separated, optional)
            <input id="mcp_args" placeholder="">
          </label>
          <button type="submit">Add MCP Server</button>
        </form>
      </details>

      <details class="card" id="tools-section">
        <summary><h2>Tools</h2></summary>
        <div id="tool-list"></div>
        <form id="tool-form">
          <div class="row">
            <label>
              Tool Name
              <input id="tool_name" placeholder="square_the_number" required>
            </label>
            <label>
              Description
              <input id="tool_description" placeholder="output the square of the number." required>
            </label>
          </div>
          <label>
            Parameters JSON
            <textarea id="tool_parameters" required>{
  "type": "object",
  "required": ["input_num"],
  "properties": {
    "input_num": {
      "type": "number",
      "description": "input_num is a number that will be squared"
    }
  }
}</textarea>
          </label>
          <label>
            Python Tool Code
            <textarea id="tool_code" required>def square_the_number(input_num: float) -> dict:
    return {"result": input_num ** 2}</textarea>
          </label>
          <button type="submit">Add / Update Tool</button>
        </form>
      </details>

      <section class="card">
        <h2>Chat</h2>
        <button class="secondary" id="clear-history" type="button">Clear History</button>
        <div id="chat-log"><div id="chat-log-live"></div></div>
        <div class="meta" id="chat-context-size">context_tokens~unknown</div>
      </section>

      <section class="card">
        <h2>Status</h2>
        <pre id="status"></pre>
      </section>
    </div>

    <div class="chat-input-bar">
      <form id="chat-form">
        <div style="display:flex;gap:8px;align-items:flex-end">
          <textarea id="chat_input" placeholder="message (empty = continue)" rows="1" style="flex:1;min-height:38px;max-height:200px;resize:none;overflow-y:hidden"></textarea>
          <button type="submit" id="send-btn" title="Send / Continue" style="width:auto;padding:8px 12px;flex-shrink:0">
            <svg id="send-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            <svg id="stop-icon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="5" y="5" width="14" height="14" rx="2"/></svg>
          </button>
        </div>
      </form>
      <button type="button" id="compact-btn" class="secondary" title="Compact history" style="width:auto;padding:4px 12px;margin-top:4px;font-size:12px">compact</button>
    </div>

    <script>
      const $ = (id) => document.getElementById(id);
      const statusEl = $("status");
      let cachedState = null;
      let isStreaming = false;
      let currentContextTokens = Number.NaN;
      let contextTokensExact = false;
      let activeStreamController = null;
      let parentUUID = null;
      let childUUID = null;
      let prevSiblingUUID = null;
      let nextSiblingUUID = null;
      let prevTurnUUID = null;
      let nextTurnUUID = null;

      function setStatus(text) {
        statusEl.textContent = text;
      }

      async function api(path, method = "GET", body = null) {
        const res = await fetch(path, {
          method,
          headers: { "Content-Type": "application/json" },
          body: body ? JSON.stringify(body) : null
        });
        const payload = await res.json().catch(() => ({ ok: false, error: `HTTP ${res.status}` }));
        if (!res.ok || payload.ok === false) {
          throw new Error(payload.error || `HTTP ${res.status}`);
        }
        return payload;
      }

      async function readResponseError(res) {
        const text = await res.text();
        if (!text) return `HTTP ${res.status}`;
        try {
          const payload = JSON.parse(text);
          return payload.error || text;
        } catch (_) {
          return text;
        }
      }

      function truncateText(value, maxChars = 220) {
        const text = String(value ?? "");
        if (text.length <= maxChars) return text;
        return `${text.slice(0, maxChars)}...`;
      }

      const _fnContextRe = /\n@@fn_start=\d+\n[\s\S]*?\n@@fn_end/;

      function stripFnContext(s) {
        return typeof s === "string" ? s.replace(_fnContextRe, "") : s;
      }

      function formatToolOutputValue(value) {
        if (value === null || value === undefined) {
          return "";
        }
        if (typeof value === "string") {
          return stripFnContext(value);
        }
        if (typeof value === "object") {
          if (Object.prototype.hasOwnProperty.call(value, "output")) {
            return formatToolOutputValue(value.output);
          }
          if (Object.prototype.hasOwnProperty.call(value, "result")) {
            return formatToolOutputValue(value.result);
          }
          try {
            return JSON.stringify(value, null, 2);
          } catch (_) {
            return String(value);
          }
        }
        return String(value);
      }

      function formatToolOutput(content) {
        if (typeof content === "string") {
          try {
            return formatToolOutputValue(JSON.parse(content));
          } catch (_) {
            return content;
          }
        }
        return formatToolOutputValue(content);
      }

      function getHashStateUUID() {
        const raw = window.location.hash.replace(/^#/, "").trim();
        return raw || "";
      }

      function setHashStateUUID(stateUUID, mode = "replace", force = false) {
        if (!stateUUID) return;
        if (mode === "none") return;
        const nextHash = `#${stateUUID}`;
        if (window.location.hash === nextHash && !force) return;
        if (mode === "push") {
          history.pushState(null, "", nextHash);
          return;
        }
        history.replaceState(null, "", nextHash);
      }

      function buildPartialAssistantText(liveTimeline) {
        if (!Array.isArray(liveTimeline) || liveTimeline.length === 0) {
          return "";
        }
        const lines = [];
        liveTimeline.forEach((entry) => {
          if (!entry || typeof entry !== "object") return;
          if (entry.type === "reasoning") {
            lines.push(`[thinking] ${String(entry.text || "")}`);
            return;
          }
          if (entry.type === "assistant") {
            lines.push(String(entry.text || ""));
            return;
          }
          if (entry.type === "tool_call") {
            lines.push(`\n[tool_call] ${entry.tool_name}(${entry.arguments || "{}"})`);
            return;
          }
          if (entry.type === "tool_result") {
            lines.push("[tool]");
            lines.push(String(entry.output || ""));
          }
        });
        return lines.join("\n").trim();
      }

      async function persistAbortedStream() {
        const currentUUID = getHashStateUUID();
        if (currentUUID) {
          await refresh(currentUUID, "none");
        } else {
          await refresh("", "none");
        }
      }

      function renderMeta(payload) {
        $("meta").textContent = `state_uuid=${payload.state_uuid} | state_hash=${payload.state_hash} | events=${payload.event_count}`;
      }

      function roughTokenCount(text) {
        return text ? Math.max(1, Math.ceil(text.length / 4)) : 0;
      }

      let streamingExtraTokens = 0;

      function renderContextSize(extra = "") {
        const total = Number.isFinite(currentContextTokens)
          ? currentContextTokens + streamingExtraTokens
          : NaN;
        const sep = contextTokensExact ? "=" : "~";
        const base = Number.isFinite(total)
          ? `context_tokens${sep}${total}`
          : "context_tokens~unknown";
        $("chat-context-size").textContent = `${base}${extra}`;
      }

      function chatLogIsNearBottom(thresholdPx = 8) {
        const el = $("chat-log");
        const distance = el.scrollHeight - el.scrollTop - el.clientHeight;
        return distance <= thresholdPx;
      }

      function setChatLogHtml(html) {
        const el = $("chat-log");
        const wasNearBottom = chatLogIsNearBottom();
        const prevScrollTop = el.scrollTop;
        // Snapshot which <details> are open (by index)
        const openSet = new Set();
        el.querySelectorAll("details.msg-raw").forEach((d, i) => {
          if (d.open) openSet.add(i);
        });
        el.innerHTML = html + '<div id="chat-log-live"></div>';
        // Restore open state
        if (openSet.size > 0) {
          el.querySelectorAll("details.msg-raw").forEach((d, i) => {
            if (openSet.has(i)) d.open = true;
          });
        }
        if (wasNearBottom) {
          el.scrollTop = el.scrollHeight;
          return;
        }
        const maxScrollTop = Math.max(0, el.scrollHeight - el.clientHeight);
        el.scrollTop = Math.min(prevScrollTop, maxScrollTop);
      }

      function setLiveHtml(html) {
        const el = $("chat-log");
        const wasNearBottom = chatLogIsNearBottom();
        $("chat-log-live").innerHTML = html;
        if (wasNearBottom) {
          el.scrollTop = el.scrollHeight;
        }
      }

      function msgBlock(cls, label, content) {
        const escaped = escapeHtml(content);
        return `<div class="msg ${cls}"><button class="msg-copy" onmousedown="event.stopPropagation()" onclick="copyMsg(event,this)" type="button"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button><div class="msg-label">${escapeHtml(label)}</div><pre class="msg-body">${escaped}</pre></div>`;
      }

      function copyMsg(ev, btn) {
        ev.preventDefault();
        const pre = btn.parentElement.querySelector(".msg-body");
        if (!pre) return;
        const origHtml = btn.innerHTML;
        navigator.clipboard.writeText(pre.textContent).then(() => {
          btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
          setTimeout(() => { btn.innerHTML = origHtml; }, 1200);
        });
      }

      function numberedLines(text, startLine, prefix) {
        const lines = text.split("\n");
        const pad = String(startLine + lines.length - 1).length;
        return lines.map((line, i) => {
          const num = String(startLine + i).padStart(pad, " ");
          return `${prefix}${num} | ${escapeHtml(line)}`;
        }).join("\n");
      }

      function prettyParams(argsStr) {
        try {
          const args = JSON.parse(argsStr);
          if (typeof args !== "object" || args === null || Array.isArray(args)) return null;
          const keys = Object.keys(args);
          if (keys.length === 0) return null;
          const parts = keys.map(k => {
            const v = args[k];
            const vs = typeof v === "string" ? v : JSON.stringify(v);
            return `<span style="color:#64748b">${escapeHtml(k)}:</span> ${escapeHtml(vs)}`;
          });
          return parts.join("  ");
        } catch(_) { return null; }
      }

      // Extract a JSON string value for a given key from possibly-incomplete JSON.
      // Returns the string if the value is complete (closing quote found), or
      // the partial string so far (with trailing "..." hint) if still streaming.
      // Returns undefined if the key hasn't appeared yet.
      function extractPartialJsonString(json, key) {
        const needle = `"${key}"`;
        const ki = json.indexOf(needle);
        if (ki === -1) return undefined;
        // Find the colon after the key
        const afterKey = json.indexOf(":", ki + needle.length);
        if (afterKey === -1) return undefined;
        // Find the opening quote of the value
        const openQ = json.indexOf('"', afterKey + 1);
        if (openQ === -1) return undefined;
        // Walk the string, handling escapes, looking for the closing quote
        let val = "";
        let i = openQ + 1;
        while (i < json.length) {
          if (json[i] === "\\") {
            if (i + 1 < json.length) {
              const esc = json[i + 1];
              if (esc === "n") val += "\n";
              else if (esc === "t") val += "\t";
              else if (esc === "r") val += "\r";
              else if (esc === "\\") val += "\\";
              else if (esc === '"') val += '"';
              else if (esc === "/") val += "/";
              else if (esc === "u") {
                // \uXXXX unicode escape
                if (i + 5 < json.length) {
                  const hex = json.substring(i + 2, i + 6);
                  const cp = parseInt(hex, 16);
                  if (!isNaN(cp)) {
                    val += String.fromCharCode(cp);
                    i += 6;
                    continue;
                  }
                }
                // Incomplete unicode escape
                return { value: val, complete: false };
              }
              else val += esc;
              i += 2;
            } else {
              // Backslash at very end — incomplete escape
              return { value: val, complete: false };
            }
          } else if (json[i] === '"') {
            return { value: val, complete: true };
          } else {
            val += json[i];
            i++;
          }
        }
        return { value: val, complete: false };
      }

      function renderMcpRemoveView(argsStr, pending, resultText) {
        const file = extractPartialJsonString(argsStr, "file");
        const name = extractPartialJsonString(argsStr, "name");
        const usePath = extractPartialJsonString(argsStr, "use_path");
        const modName = extractPartialJsonString(argsStr, "mod_name");

        if (!name && !usePath && !modName) return null;

        let html = '<div class="msg-diff">';
        if (file) {
          html += `<div class="diff-file">${escapeHtml(file.value)}</div>`;
        }
        if (name) {
          const label = name.complete ? "remove function" : "remove function (streaming)";
          html += `<div class="diff-section-label">${label}</div>`;
          // If we have the result with removed source, show it
          if (resultText) {
            const codeMatch = resultText.match(/```\n([\s\S]*?)\n```/);
            if (codeMatch) {
              html += `<pre class="diff-del">${codeMatch[1].split("\n").map(l => "- " + escapeHtml(l)).join("\n")}</pre>`;
            } else {
              html += `<pre class="diff-del">- fn ${escapeHtml(name.value)}</pre>`;
            }
          } else {
            html += `<pre class="diff-del">- fn ${escapeHtml(name.value)}${pending ? " (streaming)" : ""}</pre>`;
          }
        } else if (usePath) {
          const label = usePath.complete ? "remove use" : "remove use (streaming)";
          html += `<div class="diff-section-label">${label}</div>`;
          html += `<pre class="diff-del">- use ...${escapeHtml(usePath.value)}...;</pre>`;
        } else if (modName) {
          const label = modName.complete ? "remove mod" : "remove mod (streaming)";
          html += `<div class="diff-section-label">${label}</div>`;
          html += `<pre class="diff-del">- pub mod ${escapeHtml(modName.value)};</pre>`;
        }
        html += '</div>';
        return html;
      }

      function renderMcpAddView(argsStr, pending) {
        const file = extractPartialJsonString(argsStr, "file");
        const usePath = extractPartialJsonString(argsStr, "use_path");
        const modName = extractPartialJsonString(argsStr, "mod_name");
        const source = extractPartialJsonString(argsStr, "source");
        const name = extractPartialJsonString(argsStr, "name");

        // Need at least one content field to render
        if (!usePath && !modName && !source && !name) return null;

        let html = '<div class="msg-diff">';
        if (file) {
          html += `<div class="diff-file">${escapeHtml(file.value)}</div>`;
        }
        if (usePath) {
          const label = usePath.complete ? "add use" : "add use (streaming)";
          html += `<div class="diff-section-label">${label}</div>`;
          html += `<pre class="diff-add">+ use ${escapeHtml(usePath.value)};</pre>`;
        } else if (modName) {
          const label = modName.complete ? "add mod" : "add mod (streaming)";
          html += `<div class="diff-section-label">${label}</div>`;
          html += `<pre class="diff-add">+ pub mod ${escapeHtml(modName.value)};</pre>`;
        } else if (source) {
          const label = source.complete ? "add function" : "add function (streaming)";
          html += `<div class="diff-section-label">${label}</div>`;
          html += `<pre class="diff-add">${source.value.split("\n").map(l => "+ " + escapeHtml(l)).join("\n")}</pre>`;
        } else if (name) {
          // Structured function — assemble from fields
          const kind = extractPartialJsonString(argsStr, "kind");
          const params = extractPartialJsonString(argsStr, "params");
          const returnType = extractPartialJsonString(argsStr, "return_type");
          const requires = extractPartialJsonString(argsStr, "requires");
          const ensures = extractPartialJsonString(argsStr, "ensures");
          const body = extractPartialJsonString(argsStr, "body");
          const inside = extractPartialJsonString(argsStr, "inside");

          const label = pending ? "add function (streaming)" : "add function";
          html += `<div class="diff-section-label">${label}</div>`;
          if (inside) {
            html += `<div class="diff-section-label" style="font-size:0.8em;opacity:0.7">inside ${escapeHtml(inside.value)}</div>`;
          }

          // Build function lines
          let lines = [];
          const kindStr = kind ? kind.value + " " : "";
          const paramsStr = params ? params.value : "";
          const retStr = returnType ? " -> " + returnType.value : "";
          lines.push(`${kindStr}fn ${name.value}${paramsStr}${retStr}`);

          if (requires) {
            lines.push("    requires");
            try {
              const arr = JSON.parse(requires.value);
              if (Array.isArray(arr)) arr.forEach(r => lines.push("        " + r + ","));
              else lines.push("        " + requires.value);
            } catch(_) { lines.push("        " + requires.value); }
          }
          if (ensures) {
            lines.push("    ensures");
            try {
              const arr = JSON.parse(ensures.value);
              if (Array.isArray(arr)) arr.forEach(e => lines.push("        " + e + ","));
              else lines.push("        " + ensures.value);
            } catch(_) { lines.push("        " + ensures.value); }
          }
          if (body) {
            body.value.split("\n").forEach(l => lines.push(l));
          } else if (!pending) {
            lines.push("{ }");
          }

          html += `<pre class="diff-add">${lines.map(l => "+ " + escapeHtml(l)).join("\n")}</pre>`;
        }
        html += '</div>';
        return html;
      }

      // Simple line-level diff using LCS (longest common subsequence)
      function lineDiff(oldLines, newLines) {
        const m = oldLines.length, n = newLines.length;
        // Build LCS table
        const dp = Array.from({length: m + 1}, () => new Uint16Array(n + 1));
        for (let i = 1; i <= m; i++) {
          for (let j = 1; j <= n; j++) {
            dp[i][j] = oldLines[i-1] === newLines[j-1]
              ? dp[i-1][j-1] + 1
              : Math.max(dp[i-1][j], dp[i][j-1]);
          }
        }
        // Backtrack to produce diff entries
        const result = [];
        let i = m, j = n;
        while (i > 0 || j > 0) {
          if (i > 0 && j > 0 && oldLines[i-1] === newLines[j-1]) {
            result.push({type: "ctx", text: oldLines[i-1]});
            i--; j--;
          } else if (j > 0 && (i === 0 || dp[i][j-1] >= dp[i-1][j])) {
            result.push({type: "add", text: newLines[j-1]});
            j--;
          } else {
            result.push({type: "del", text: oldLines[i-1]});
            i--;
          }
        }
        result.reverse();
        return result;
      }

      function renderUnifiedDiff(oldText, newText) {
        const oldLines = oldText.split("\n");
        const newLines = newText.split("\n");
        const diff = lineDiff(oldLines, newLines);
        return diff.map(d => {
          const prefix = d.type === "del" ? "- " : d.type === "add" ? "+ " : "  ";
          const cls = d.type === "del" ? "diff-del" : d.type === "add" ? "diff-add" : "diff-ctx";
          return `<span class="${cls}">${prefix}${escapeHtml(d.text)}</span>`;
        }).join("\n");
      }

      // Parse @@fn_start=N ... @@fn_end from tool result text
      function parseFnContext(resultText) {
        if (!resultText) return null;
        const m = resultText.match(/@@fn_start=(\d+)\n([\s\S]*?)\n@@fn_end/);
        if (!m) return null;
        return { startLine: parseInt(m[1], 10), source: m[2] };
      }

      // Render function-scoped diff with line numbers
      function renderFnScopedDiff(fnSource, fnStartLine, oldString, newString) {
        // Reconstruct "before" function by replacing new_string → old_string
        const beforeFn = fnSource.replace(newString, oldString);
        const afterLines = fnSource.split("\n");
        const beforeLines = beforeFn.split("\n");
        const totalLines = afterLines.length;

        const diff = lineDiff(beforeLines, afterLines);

        // If function > 100 lines, show header ... changed region ... closing brace
        if (totalLines > 100) {
          // Find first and last changed line indices in the diff
          let firstChange = -1, lastChange = -1;
          for (let i = 0; i < diff.length; i++) {
            if (diff[i].type !== "ctx") {
              if (firstChange === -1) firstChange = i;
              lastChange = i;
            }
          }
          if (firstChange === -1) {
            // No changes found — just show context
            return `<pre class="diff-ctx">${afterLines.map((l, i) => `<span class="diff-ctx">${String(fnStartLine + i).padStart(4)}   ${escapeHtml(l)}</span>`).join("\n")}</pre>`;
          }

          // Show: first line (signature), ..., 3 context before change, changes, 3 context after, ..., last line
          const contextPad = 3;
          const showStart = Math.max(1, firstChange - contextPad);
          const showEnd = Math.min(diff.length - 2, lastChange + contextPad);

          let lines = [];
          let lineNo = fnStartLine;

          // First line (function signature)
          lines.push(`<span class="diff-ctx">${String(lineNo).padStart(4)}   ${escapeHtml(diff[0].text)}</span>`);
          lineNo += 1;

          // ... gap
          if (showStart > 1) {
            lines.push(`<span class="diff-ctx">        ...</span>`);
            lineNo = fnStartLine + showStart; // approximate
          }

          // Track line number through diff entries
          let curLine = fnStartLine;
          for (let i = 0; i < diff.length; i++) {
            if (diff[i].type !== "del") curLine++;
          }
          // Re-walk with proper line tracking
          lines = [];
          let fileLineNo = fnStartLine;
          let inRange = false;
          let beforeRange = true;
          let signatureDone = false;

          for (let i = 0; i < diff.length; i++) {
            const d = diff[i];
            const isChanged = d.type !== "ctx";
            const nearChange = (i >= firstChange - contextPad && i <= lastChange + contextPad);

            if (!signatureDone) {
              // Always show first line
              const ln = d.type === "del" ? "    " : String(fileLineNo).padStart(4);
              lines.push(`<span class="diff-ctx">${ln}   ${escapeHtml(d.text)}</span>`);
              signatureDone = true;
              if (d.type !== "del") fileLineNo++;
              continue;
            }

            if (nearChange && beforeRange) {
              lines.push(`<span class="diff-ctx">        ...</span>`);
              beforeRange = false;
              inRange = true;
            }

            if (inRange && nearChange) {
              const prefix = d.type === "del" ? "- " : d.type === "add" ? "+ " : "  ";
              const cls = d.type === "del" ? "diff-del" : d.type === "add" ? "diff-add" : "diff-ctx";
              const ln = d.type === "del" ? "    " : String(fileLineNo).padStart(4);
              lines.push(`<span class="${cls}">${ln} ${prefix}${escapeHtml(d.text)}</span>`);
            }

            if (inRange && !nearChange && i > lastChange + contextPad) {
              inRange = false;
            }

            if (d.type !== "del") fileLineNo++;
          }

          // ... gap + closing brace
          lines.push(`<span class="diff-ctx">        ...</span>`);
          const lastAfterLine = afterLines[afterLines.length - 1];
          lines.push(`<span class="diff-ctx">${String(fnStartLine + afterLines.length - 1).padStart(4)}   ${escapeHtml(lastAfterLine)}</span>`);

          return `<pre style="margin:0;padding:4px 8px;font-size:12px;line-height:1.5;white-space:pre-wrap;overflow-x:auto">${lines.join("\n")}</pre>`;
        }

        // Short function (≤100 lines) — show full function with diff coloring and line numbers
        let resultLines = [];
        let fileLineNo = fnStartLine;
        for (const d of diff) {
          const prefix = d.type === "del" ? "- " : d.type === "add" ? "+ " : "  ";
          const cls = d.type === "del" ? "diff-del" : d.type === "add" ? "diff-add" : "diff-ctx";
          const ln = d.type === "del" ? "    " : String(fileLineNo).padStart(4);
          resultLines.push(`<span class="${cls}">${ln} ${prefix}${escapeHtml(d.text)}</span>`);
          if (d.type !== "del") fileLineNo++;
        }
        return `<pre style="margin:0;padding:4px 8px;font-size:12px;line-height:1.5;white-space:pre-wrap;overflow-x:auto">${resultLines.join("\n")}</pre>`;
      }

      function renderMcpEditDiff(argsStr, pending, resultText) {
        const file = extractPartialJsonString(argsStr, "file");
        const name = extractPartialJsonString(argsStr, "name");
        const oldStr = extractPartialJsonString(argsStr, "old_string");
        const newStr = extractPartialJsonString(argsStr, "new_string");

        if (!oldStr && !newStr) return null;

        let html = '<div class="msg-diff">';
        // Header: file :: function
        const filePart = file ? escapeHtml(file.value) : "";
        const namePart = name ? escapeHtml(name.value) : "";
        if (filePart || namePart) {
          const header = [filePart, namePart].filter(Boolean).join(" :: ");
          html += `<div class="diff-file">${header}</div>`;
        }

        const complete = oldStr && oldStr.complete && newStr && newStr.complete;
        if (complete) {
          // Try to use function context from result
          const fnCtx = parseFnContext(resultText);
          if (fnCtx) {
            html += renderFnScopedDiff(fnCtx.source, fnCtx.startLine, oldStr.value, newStr.value);
          } else {
            // Fallback: plain unified diff
            html += `<pre style="margin:0;padding:4px 8px;font-size:12px;line-height:1.5;white-space:pre-wrap;overflow-x:auto">${renderUnifiedDiff(oldStr.value, newStr.value)}</pre>`;
          }
        } else {
          // Still streaming — show old/new blocks separately
          if (oldStr) {
            const label = oldStr.complete ? "replace" : "replace (streaming)";
            html += `<div class="diff-section-label">${label}</div>`;
            html += `<pre class="diff-del">${oldStr.value.split("\n").map(l => "- " + escapeHtml(l)).join("\n")}</pre>`;
          }
          if (newStr) {
            const label = newStr.complete ? "with" : "with (streaming)";
            html += `<div class="diff-section-label">${label}</div>`;
            html += `<pre class="diff-add">${newStr.value.split("\n").map(l => "+ " + escapeHtml(l)).join("\n")}</pre>`;
          } else if (oldStr && oldStr.complete) {
            html += `<div class="diff-section-label">with (waiting...)</div>`;
          }
        }
        html += '</div>';
        return html;
      }

      function renderFileEditDiff(argsStr, pending, startLine) {
        const path = extractPartialJsonString(argsStr, "path");
        const oldStr = extractPartialJsonString(argsStr, "old_string");
        const newStr = extractPartialJsonString(argsStr, "new_string");
        const create = argsStr.includes('"create"') && argsStr.includes("true");
        const sl = startLine || 1;

        // Not enough data yet to show anything pretty
        if (!oldStr && !newStr) return null;

        let html = '<div class="msg-diff">';
        if (path) {
          const pathLabel = escapeHtml(path.value) + (create ? " (new file)" : (startLine ? ":" + sl : ""));
          html += `<div class="diff-file">${pathLabel}</div>`;
        }

        const complete = oldStr && oldStr.complete && newStr && newStr.complete && !create;
        if (complete) {
          // Finished — show unified diff
          html += `<pre style="margin:0;padding:4px 8px;font-size:12px;line-height:1.5;white-space:pre-wrap;overflow-x:auto">${renderUnifiedDiff(oldStr.value, newStr.value)}</pre>`;
        } else {
          if (oldStr && !create) {
            const label = oldStr.complete ? "replace" : "replace (streaming)";
            html += `<div class="diff-section-label">${label}</div>`;
            html += `<pre class="diff-del">${numberedLines(oldStr.value, sl, "-")}</pre>`;
          }
          if (newStr) {
            const label = newStr.complete ? (create ? "content" : "with") : (create ? "content (streaming)" : "with (streaming)");
            html += `<div class="diff-section-label">${label}</div>`;
            html += `<pre class="diff-add">${numberedLines(newStr.value, sl, "+")}</pre>`;
          } else if (oldStr && oldStr.complete && !create) {
            html += `<div class="diff-section-label">with (waiting...)</div>`;
          }
        }
        html += '</div>';
        return html;
      }

      function renderToolCallHtml(toolName, argsStr, pending, startLine, resultText, resultRaw) {
        const eName = escapeHtml(toolName);
        const label = pending ? `calling ${eName}...` : `call ${eName}`;
        let bodyHtml = "";
        if (toolName === "file_edit") {
          const diffHtml = renderFileEditDiff(argsStr, pending, startLine);
          if (diffHtml) bodyHtml = diffHtml;
        } else if (toolName === "edit") {
          const diffHtml = renderMcpEditDiff(argsStr, pending, resultRaw || resultText);
          if (diffHtml) bodyHtml = diffHtml;
        } else if (toolName === "add") {
          const diffHtml = renderMcpAddView(argsStr, pending);
          if (diffHtml) bodyHtml = diffHtml;
        } else if (toolName === "remove") {
          const diffHtml = renderMcpRemoveView(argsStr, pending, resultText);
          if (diffHtml) bodyHtml = diffHtml;
        } else if (!pending) {
          const pretty = prettyParams(argsStr);
          if (pretty) {
            bodyHtml = `<div class="msg-params">${pretty}</div>`;
          }
        }
        const rawDetails = `<details class="msg-raw"><summary>json</summary><pre class="msg-body">${escapeHtml(argsStr)}</pre></details>`;
        return `<div class="msg msg-tool-call"><button class="msg-copy" onmousedown="event.stopPropagation()" onclick="copyMsg(event,this)" type="button"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button><div class="msg-label">${label}</div>${bodyHtml}${rawDetails}</div>`;
      }

      function extractStartLine(content) {
        try {
          const obj = typeof content === "string" ? JSON.parse(content) : content;
          if (obj && typeof obj === "object" && typeof obj.start_line === "number") return obj.start_line;
        } catch(_) {}
        return null;
      }

      function historyToBlocks(history) {
        if (!history || history.length === 0) return [];
        const blocks = [];
        // Build maps from tool_call_id to start_line, tool call info, and result text
        const startLineMap = {};
        const toolCallMap = {};
        const toolResultMap = {};
        const toolResultRawMap = {};
        history.forEach((msg) => {
          if (msg.role === "tool" && msg.tool_call_id) {
            const sl = extractStartLine(msg.content);
            if (sl != null) startLineMap[msg.tool_call_id] = sl;
            // Use _full_content (has fn context metadata) if available, else content
            const fullContent = msg._full_content || msg.content;
            // formatToolOutput strips @@fn_context for display; keep raw for diff parsing
            toolResultMap[msg.tool_call_id] = formatToolOutput(fullContent);
            toolResultRawMap[msg.tool_call_id] = typeof fullContent === "string" ? fullContent : JSON.stringify(fullContent);
          }
          if (msg.tool_calls) {
            msg.tool_calls.forEach((tc) => {
              if (tc.id) {
                try {
                  toolCallMap[tc.id] = { name: tc.function.name, args: JSON.parse(tc.function.arguments || "{}") };
                } catch(_) {
                  toolCallMap[tc.id] = { name: tc.function.name, args: {} };
                }
              }
            });
          }
        });
        history.forEach((msg) => {
          if (msg.role === "tool") {
            const text = formatToolOutput(msg.content);
            const tc = msg.tool_call_id ? toolCallMap[msg.tool_call_id] : null;
            if (tc && tc.name === "read_file" && typeof tc.args.path === "string" && tc.args.path.endsWith(".rs")) {
              const html = `<div class="msg msg-tool"><button class="msg-copy" onmousedown="event.stopPropagation()" onclick="copyMsg(event,this)" type="button"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button><div class="msg-label">${escapeHtml("tool")}</div><pre class="msg-body">${highlightRustOutput(text)}</pre></div>`;
              blocks.push(html);
            } else {
              blocks.push(msgBlock("msg-tool", "tool", text));
            }
            return;
          }
          if (msg.reasoning_content) {
            const rc = typeof msg.reasoning_content === "string" ? msg.reasoning_content : JSON.stringify(msg.reasoning_content);
            blocks.push(msgBlock("msg-thinking", "thinking", rc));
          }
          const content = typeof msg.content === "string" ? msg.content : JSON.stringify(msg.content);
          if (msg.role === "assistant" && msg.tool_calls) {
            // Show assistant text + raw response toggle
            const rawJson = JSON.stringify(msg, null, 2);
            const rawDetails = `<details class="msg-raw"><summary>raw response</summary><pre class="msg-body">${escapeHtml(rawJson)}</pre></details>`;
            blocks.push(`<div class="msg msg-assistant"><button class="msg-copy" onmousedown="event.stopPropagation()" onclick="copyMsg(event,this)" type="button"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button><div class="msg-label">assistant</div><pre class="msg-body">${escapeHtml(content)}</pre>${rawDetails}</div>`);
          } else {
            blocks.push(msgBlock(`msg-${msg.role}`, msg.role, content));
          }
          if (msg.tool_calls) {
            msg.tool_calls.forEach((tc) => {
              const sl = tc.id ? startLineMap[tc.id] : null;
              const rt = tc.id ? toolResultMap[tc.id] : null;
              const rtRaw = tc.id ? toolResultRawMap[tc.id] : null;
              blocks.push(renderToolCallHtml(tc.function.name, tc.function.arguments || "{}", false, sl, rt, rtRaw));
            });
          }
        });
        return blocks;
      }

      function historyToHtml(history) {
        return historyToBlocks(history).join("");
      }

      // --- Virtual scroll for chat-log ---
      const VS_BUFFER = 5;       // extra blocks above/below viewport
      const VS_EST_H = 60;       // estimated height for unmeasured blocks
      let vsBlocks = [];         // [{html, height}]
      let vsStart = 0;           // first rendered index
      let vsEnd = -1;            // last rendered index
      let vsActive = false;      // true when virtual scroll is managing chat-log
      let vsScrollRAF = null;    // requestAnimationFrame id for scroll handler

      function vsInit(blocks) {
        vsBlocks = blocks.map(html => ({ html, height: 0 }));
        vsStart = 0;
        vsEnd = -1;
        vsActive = true;
        const el = $("chat-log");

        // Measure all blocks: render them all once, measure, then switch to virtual
        let measureHtml = "";
        for (let i = 0; i < vsBlocks.length; i++) {
          measureHtml += `<div class="vs-block" data-vs="${i}">${vsBlocks[i].html}</div>`;
        }
        el.innerHTML = measureHtml;
        el.querySelectorAll(".vs-block").forEach(node => {
          const idx = parseInt(node.dataset.vs);
          vsBlocks[idx].height = node.offsetHeight || VS_EST_H;
        });

        // Now switch to virtual layout
        el.innerHTML = '<div id="vs-top"></div><div id="vs-mid"></div><div id="vs-bot"></div><div id="chat-log-live"></div>';
        vsUpdate(true);
      }

      function vsUpdate(scrollToBottom) {
        const el = $("chat-log");
        if (!vsActive || vsBlocks.length === 0) return;

        const scrollTop = el.scrollTop;
        const viewH = el.clientHeight;

        // Find first visible block
        let cum = 0, visStart = 0;
        for (let i = 0; i < vsBlocks.length; i++) {
          if (cum + vsBlocks[i].height > scrollTop) { visStart = i; break; }
          cum += vsBlocks[i].height;
          if (i === vsBlocks.length - 1) visStart = i;
        }
        // Find last visible block
        let visEnd = visStart, h = 0;
        for (let i = visStart; i < vsBlocks.length; i++) {
          visEnd = i;
          h += vsBlocks[i].height;
          if (h >= viewH) break;
        }

        const newStart = Math.max(0, visStart - VS_BUFFER);
        const newEnd = Math.min(vsBlocks.length - 1, visEnd + VS_BUFFER);

        if (newStart === vsStart && newEnd === vsEnd && !scrollToBottom) return;

        // Build mid content
        let midHtml = "";
        for (let i = newStart; i <= newEnd; i++) {
          midHtml += `<div class="vs-block" data-vs="${i}">${vsBlocks[i].html}</div>`;
        }
        $("vs-mid").innerHTML = midHtml;

        // Spacers (heights are pre-measured, so no jumping)
        let topH = 0;
        for (let i = 0; i < newStart; i++) topH += vsBlocks[i].height;
        let botH = 0;
        for (let i = newEnd + 1; i < vsBlocks.length; i++) botH += vsBlocks[i].height;

        $("vs-top").style.height = topH + "px";
        $("vs-bot").style.height = botH + "px";

        vsStart = newStart;
        vsEnd = newEnd;

        if (scrollToBottom) {
          el.scrollTop = el.scrollHeight;
        }
      }

      function vsDeactivate() {
        vsActive = false;
        vsBlocks = [];
        vsStart = 0;
        vsEnd = -1;
        // Ensure chat-log-live exists inside chat-log
        if (!$("chat-log-live")) {
          $("chat-log").insertAdjacentHTML("beforeend", '<div id="chat-log-live"></div>');
        }
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      const RUST_KEYWORDS = new Set([
        "as","async","await","break","const","continue","crate","dyn","else","enum",
        "extern","false","fn","for","if","impl","in","let","loop","match","mod","move",
        "mut","pub","ref","return","self","Self","static","struct","super","trait","true",
        "type","unsafe","use","where","while","yield",
      ]);
      const RUST_TYPES = new Set([
        "bool","char","f32","f64","i8","i16","i32","i64","i128","isize",
        "u8","u16","u32","u64","u128","usize","str","String",
        "Vec","Option","Result","Box","Rc","Arc","HashMap","HashSet",
        "Some","None","Ok","Err",
      ]);

      function highlightRustLine(line) {
        // The read_file output format: "   123\t code here"
        // Split into line-number prefix and code
        const tabIdx = line.indexOf("\t");
        let prefix = "", code = line;
        if (tabIdx !== -1 && /^\s*\d+$/.test(line.slice(0, tabIdx))) {
          prefix = `<span class="hl-linenum">${escapeHtml(line.slice(0, tabIdx + 1))}</span>`;
          code = line.slice(tabIdx + 1);
        }
        if (!code) return prefix;

        // Tokenize with a single regex pass
        const tokens = [];
        const re = /\/\/.*$|\/\*[\s\S]*?\*\/|r#*"[\s\S]*?"#*|"(?:[^"\\]|\\.)*"|'(?:[^'\\]|\\.)'|'[a-zA-Z_]\w*|#\[[\w:]*\]|#!\[[\w:]*\]|\b[a-zA-Z_]\w*!\b|\b[a-zA-Z_]\w*!(?=\()|0x[0-9a-fA-F_]+|0b[01_]+|0o[0-7_]+|\d[\d_]*(?:\.\d[\d_]*)?(?:[eE][+-]?\d+)?|\b[a-zA-Z_]\w*\b|[^\s\w]|\s+/g;
        let m;
        while ((m = re.exec(code)) !== null) {
          const tok = m[0];
          if (tok.startsWith("//") || tok.startsWith("/*")) {
            tokens.push(`<span class="hl-comment">${escapeHtml(tok)}</span>`);
          } else if (tok.startsWith('"') || tok.startsWith("r#") || tok.startsWith("r\"") || (tok.startsWith("'") && tok.length > 2 && tok.endsWith("'"))) {
            tokens.push(`<span class="hl-str">${escapeHtml(tok)}</span>`);
          } else if (tok.startsWith("'") && tok.length > 1 && !tok.endsWith("'")) {
            // lifetime 'a
            tokens.push(`<span class="hl-lifetime">${escapeHtml(tok)}</span>`);
          } else if (tok.startsWith("#[") || tok.startsWith("#![")) {
            tokens.push(`<span class="hl-attr">${escapeHtml(tok)}</span>`);
          } else if (tok.endsWith("!") && /^[a-zA-Z_]\w*!$/.test(tok)) {
            tokens.push(`<span class="hl-macro">${escapeHtml(tok)}</span>`);
          } else if (/^(?:0x|0b|0o|\d)/.test(tok)) {
            tokens.push(`<span class="hl-num">${escapeHtml(tok)}</span>`);
          } else if (RUST_KEYWORDS.has(tok)) {
            tokens.push(`<span class="hl-kw">${escapeHtml(tok)}</span>`);
          } else if (RUST_TYPES.has(tok)) {
            tokens.push(`<span class="hl-type">${escapeHtml(tok)}</span>`);
          } else {
            tokens.push(escapeHtml(tok));
          }
        }
        return prefix + tokens.join("");
      }

      function highlightRustOutput(text) {
        // First line is the header "path.rs (N lines) [showing ...]"
        const lines = text.split("\n");
        return lines.map((line, i) => {
          if (i === 0) return `<span class="hl-comment">${escapeHtml(line)}</span>`;
          return highlightRustLine(line);
        }).join("\n");
      }

      function renderToolList(tools, builtinTools) {
        const names = Object.keys(tools);
        const enabledBuiltins = Object.entries(builtinTools || {})
          .filter(([, enabled]) => Boolean(enabled))
          .map(([name]) => name);

        if (names.length === 0 && enabledBuiltins.length === 0) {
          $("tool-list").innerHTML = "<p>No tools added yet.</p>";
          return;
        }

        const customHtml = names
          .map((name) => {
            const escapedName = escapeHtml(name);
            const encodedName = encodeURIComponent(name);
            return `<div class="tool-row"><span class="pill">${escapedName}</span><button class="tool-remove" type="button" data-tool-name="${encodedName}">Remove</button></div>`;
          })
          .join("");

        const builtinHtml = enabledBuiltins
          .map((name) => `<span class="pill">${escapeHtml(name)} (builtin)</span>`)
          .join("");

        $("tool-list").innerHTML = customHtml + builtinHtml;
      }

      let cachedMcpTools = {};

      function renderMcpList(mcpServers, mcpToolsInfo) {
        const container = $("mcp-list");
        const serverNames = Object.keys(mcpServers || {});
        if (serverNames.length === 0) {
          container.innerHTML = "<p>No MCP servers configured.</p>";
          return;
        }
        let html = "";
        for (const srvName of serverNames) {
          const srv = mcpServers[srvName];
          const info = mcpToolsInfo[srvName] || {};
          const toolFlags = srv.tools || {};
          const escapedName = escapeHtml(srvName);
          const encodedName = encodeURIComponent(srvName);

          html += `<div class="mcp-server">`;
          html += `<div class="mcp-server-header">`;
          html += `<strong>${escapedName}</strong>`;
          html += `<code style="font-size:11px">${escapeHtml(srv.command)}</code>`;
          html += `<button class="tool-remove mcp-remove" type="button" data-mcp-name="${encodedName}">Remove</button>`;
          html += `</div>`;

          if (info.error) {
            html += `<div class="meta" style="color:#f87171">${escapeHtml(info.error)}</div>`;
          } else if (info.tools && info.tools.length > 0) {
            html += `<div class="checkbox-grid">`;
            for (const t of info.tools) {
              const tName = t.name;
              const checked = Object.keys(toolFlags).length === 0 ? true : toolFlags[tName] !== false;
              const cbId = `mcp_tool_${encodedName}_${encodeURIComponent(tName)}`;
              html += `<label class="checkbox-row">`;
              html += `<input type="checkbox" id="${cbId}" data-mcp-server="${encodedName}" data-mcp-tool="${encodeURIComponent(tName)}" ${checked ? "checked" : ""}>`;
              html += `<span>${escapeHtml(tName)}</span>`;
              html += `</label>`;
            }
            html += `</div>`;
          } else {
            html += `<div class="meta">No tools discovered yet.</div>`;
          }
          html += `</div>`;
        }
        container.innerHTML = html;
      }

      async function fetchMcpTools() {
        try {
          const payload = await api("/api/mcp_tools");
          cachedMcpTools = payload.mcp_tools || {};
        } catch (_) {
          cachedMcpTools = {};
        }
      }

      function isVirtualScrollEnabled() {
        return $("virtual_scroll").checked;
      }

      function renderChat(history) {
        $("chat-log-live").innerHTML = "";
        if (!history || history.length === 0) {
          vsDeactivate();
          $("chat-log").innerHTML = '<div class="meta">No messages yet.</div><div id="chat-log-live"></div>';
          return;
        }
        if (isVirtualScrollEnabled()) {
          vsInit(historyToBlocks(history));
        } else {
          vsDeactivate();
          setChatLogHtml(historyToHtml(history));
        }
      }

      async function streamChatRequest(userInput, continueOnly = false) {
        const controller = new AbortController();
        activeStreamController = controller;
        let liveTimeline = [];
        try {
          const res = await fetch("/api/chat/stream", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: userInput, continue: continueOnly, state_uuid: getHashStateUUID() }),
            signal: controller.signal
          });
          if (!res.ok) {
            throw new Error(await readResponseError(res));
          }
          if (!res.body) {
            throw new Error("Streaming response body not available in this browser.");
          }

          const reader = res.body.getReader();
          const decoder = new TextDecoder();
          let buffer = "";
          const baseHistory = Array.isArray(cachedState?.history) ? cachedState.history : [];
          liveTimeline = [];

          const addDelta = (text) => {
            const piece = String(text || "");
            const last = liveTimeline[liveTimeline.length - 1];
            if (last && last.type === "assistant") {
              last.text += piece;
            } else {
              liveTimeline.push({ type: "assistant", text: piece });
            }
          };

          const addReasoning = (text) => {
            const piece = String(text || "");
            const last = liveTimeline[liveTimeline.length - 1];
            if (last && last.type === "reasoning") {
              last.text += piece;
            } else {
              liveTimeline.push({ type: "reasoning", text: piece });
            }
          };

          let mergePrefix = "";
          let mergeBaseHistory = baseHistory;
          if (continueOnly && baseHistory.length > 0 && baseHistory[baseHistory.length - 1].role === "assistant") {
            mergePrefix = baseHistory[baseHistory.length - 1].content || "";
            mergeBaseHistory = baseHistory.slice(0, -1);
          }

          // Render base history ONCE into chat-log (static part)
          {
            const baseBlocks = historyToBlocks(mergeBaseHistory);
            if (!continueOnly) {
              baseBlocks.push(msgBlock("msg-user", "user", userInput));
            }
            if (isVirtualScrollEnabled()) {
              vsInit(baseBlocks);
            } else {
              vsDeactivate();
              $("chat-log").innerHTML = baseBlocks.join("") + '<div id="chat-log-live"></div>';
            }
          }

          // Track how many timeline entries have been fully committed to the DOM.
          // Only the entry at liveCommitted (the "tail") gets re-rendered on updates;
          // entries before it are frozen in place.
          let liveCommitted = 0;
          let liveFirstAssistant = true; // tracks mergePrefix across entries
          let streamPhase = "processing input";
          let rawEventLog = []; // collect all SSE events for raw view
          setStatus("processing input...");

          function liveEntryHtml(entry) {
            if (entry.type === "reasoning") {
              return msgBlock("msg-thinking", "thinking", entry.text || "...");
            } else if (entry.type === "assistant") {
              const prefix = liveFirstAssistant ? mergePrefix : "";
              // Don't advance liveFirstAssistant here — caller decides when to freeze
              return msgBlock("msg-assistant", "assistant", prefix + (entry.text || "..."));
            } else if (entry.type === "tool_call") {
              return renderToolCallHtml(entry.tool_name, entry.arguments || "{}", !!entry.pending, entry.startLine, entry.resultText, entry.resultRaw);
            } else if (entry.type === "tool_result") {
              return msgBlock("msg-tool", "tool", entry.output || "");
            }
            return "";
          }

          const renderLive = () => {
            const liveEl = $("chat-log-live");
            const wasNearBottom = chatLogIsNearBottom();

            if (liveTimeline.length === 0) {
              liveEl.innerHTML = msgBlock("msg-assistant", "assistant", mergePrefix + "...");
              liveCommitted = 0;
              liveFirstAssistant = true;
              if (wasNearBottom) $("chat-log").scrollTop = $("chat-log").scrollHeight;
              return;
            }

            // Commit all entries before the last one — they won't change anymore
            while (liveCommitted < liveTimeline.length - 1) {
              const entry = liveTimeline[liveCommitted];
              const div = document.createElement("div");
              div.className = "live-committed";
              div.innerHTML = liveEntryHtml(entry);
              // Insert before the tail element if it exists, else append
              const tail = liveEl.querySelector(".live-tail");
              if (tail) {
                liveEl.insertBefore(div, tail);
              } else {
                liveEl.appendChild(div);
              }
              if (entry.type === "assistant") liveFirstAssistant = false;
              liveCommitted++;
            }

            // Render/update only the tail (last) entry
            const tailEntry = liveTimeline[liveTimeline.length - 1];
            let tail = liveEl.querySelector(".live-tail");
            if (!tail) {
              tail = document.createElement("div");
              tail.className = "live-tail";
              liveEl.appendChild(tail);
            }
            tail.innerHTML = liveEntryHtml(tailEntry);

            // Update raw event log viewer
            if (rawEventLog.length > 0) {
              let rawEl = liveEl.querySelector(".live-raw-log");
              if (!rawEl) {
                rawEl = document.createElement("div");
                rawEl.className = "live-raw-log";
                liveEl.appendChild(rawEl);
              }
              const rawJson = rawEventLog.map(e => JSON.stringify(e, null, 2)).join("\n---\n");
              rawEl.innerHTML = `<details class="msg-raw"><summary>raw events (${rawEventLog.length})</summary><pre class="msg-body" style="max-height:400px">${escapeHtml(rawJson)}</pre></details>`;
            }

            if (wasNearBottom) $("chat-log").scrollTop = $("chat-log").scrollHeight;
          };

          const handleEvent = async (evt) => {
            if (!evt || typeof evt !== "object") return false;
            // Log tool-related events for raw view (skip noisy text deltas)
            if (evt.type === "tool_call_start" || evt.type === "tool_call" || evt.type === "tool_result") {
              rawEventLog.push(evt);
            }
            if (evt.type === "snapshot") {
              setHashStateUUID(evt.state_uuid, "replace");
              return false;
            }
            if (evt.type === "reasoning_delta") {
              if (streamPhase === "processing input") { streamPhase = "thinking"; setStatus("thinking..."); }
              addReasoning(evt.content);
              streamingExtraTokens += roughTokenCount(evt.content);
              renderLive();
              renderContextSize(" (streaming)");
              return false;
            }
            if (evt.type === "delta") {
              if (streamPhase !== "generating") { streamPhase = "generating"; setStatus("generating..."); }
              addDelta(evt.content);
              streamingExtraTokens += roughTokenCount(evt.content);
              renderLive();
              renderContextSize(" (streaming)");
              return false;
            }
            if (evt.type === "tool_call_start") {
              if (streamPhase !== "generating") { streamPhase = "generating"; setStatus("generating..."); }
              liveTimeline.push({
                type: "tool_call",
                tool_name: evt.tool_name,
                arguments: "",
                pending: true,
                tcIndex: evt.index ?? 0
              });
              renderLive();
              return false;
            }
            if (evt.type === "tool_call_delta") {
              const entry = liveTimeline.findLast(
                (e) => e.type === "tool_call" && e.pending && e.tcIndex === (evt.index ?? 0)
              );
              if (entry) {
                entry.arguments += evt.arguments_delta || "";
                // If this entry is already committed (not the tail), update its DOM
                const entryIdx = liveTimeline.lastIndexOf(entry);
                if (entryIdx < liveCommitted) {
                  const committedDivs = $("chat-log-live").querySelectorAll(".live-committed");
                  if (committedDivs[entryIdx]) {
                    committedDivs[entryIdx].innerHTML = liveEntryHtml(entry);
                  }
                }
              }
              renderLive();
              return false;
            }
            if (evt.type === "tool_call") {
              const pending = liveTimeline.findLast(
                (e) => e.type === "tool_call" && e.pending && e.tool_name === evt.tool_name
              );
              if (pending) {
                pending.arguments = evt.arguments || "{}";
                pending.pending = false;
                // If this entry was already committed (not the tail), rebuild its DOM
                const pendingIdx = liveTimeline.lastIndexOf(pending);
                if (pendingIdx < liveCommitted) {
                  const committedDivs = $("chat-log-live").querySelectorAll(".live-committed");
                  if (committedDivs[pendingIdx]) {
                    committedDivs[pendingIdx].innerHTML = liveEntryHtml(pending);
                  }
                }
              } else {
                liveTimeline.push({
                  type: "tool_call",
                  tool_name: evt.tool_name,
                  arguments: evt.arguments || "{}"
                });
              }
              streamingExtraTokens += roughTokenCount(evt.arguments || "{}") + roughTokenCount(evt.tool_name) + 6;
              renderLive();
              renderContextSize(" (streaming)");
              return false;
            }
            if (evt.type === "tool_result") {
              streamPhase = "running tools";
              setStatus("running tools...");
              const output = formatToolOutput(evt.result ?? {});
              const rawResult = typeof evt.result === "string" ? evt.result : JSON.stringify(evt.result ?? {});
              streamingExtraTokens += roughTokenCount(rawResult) + 4;
              // Extract start_line and attach to the most recent file_edit tool call
              const sl = extractStartLine(evt.result);
              // Attach result text to matching tool_call for diff rendering
              const matchingTc = liveTimeline.findLast(e => e.type === "tool_call" && e.tool_name === evt.tool_name);
              if (matchingTc) {
                matchingTc.resultText = output;
                matchingTc.resultRaw = rawResult;
                matchingTc.pending = false;
                if (sl != null) matchingTc.startLine = sl;
                // If already committed, update DOM in place
                const tcIdx = liveTimeline.lastIndexOf(matchingTc);
                if (tcIdx < liveCommitted) {
                  const committedDivs = $("chat-log-live").querySelectorAll(".live-committed");
                  if (committedDivs[tcIdx]) {
                    committedDivs[tcIdx].innerHTML = liveEntryHtml(matchingTc);
                  }
                }
              }
              liveTimeline.push({
                type: "tool_result",
                output
              });
              renderLive();
              renderContextSize(" (streaming)");
              return false;
            }
            if (evt.type === "rollback") {
              // Server rolled back a junk tool call — clear the pending tool calls from timeline
              streamPhase = "processing input";
              setStatus("rollback: " + (evt.reason || "retrying..."));
              // Remove the last pending tool_call entries from timeline
              while (liveTimeline.length > 0 && liveTimeline[liveTimeline.length - 1].type === "tool_call") {
                liveTimeline.pop();
              }
              // Remove the last assistant entry too (it was the one with junk calls)
              while (liveTimeline.length > 0 && liveTimeline[liveTimeline.length - 1].type === "assistant") {
                liveTimeline.pop();
              }
              // Reset committed count if needed
              liveCommitted = Math.min(liveCommitted, liveTimeline.length);
              // Rebuild the live DOM
              const liveEl = $("chat-log-live");
              liveEl.innerHTML = "";
              liveCommitted = 0;
              renderLive();
              return false;
            }
            if (evt.type === "usage") {
              // Real token counts from the API — replace estimates
              currentContextTokens = evt.prompt_tokens || evt.total_tokens;
              contextTokensExact = true;
              streamingExtraTokens = 0;
              // Usage comes at end of a completion — next event is either done or a new round
              streamPhase = "processing input";
              setStatus("processing input...");
              renderContextSize(" (streaming)");
              return false;
            }
            if (evt.type === "done") {
              streamingExtraTokens = 0;
              // Commit the exact persisted snapshot hash for this completed message.
              setHashStateUUID(evt.state_uuid, "push");
              await refresh(evt.state_uuid, "none");
              setStatus("");
              return true;
            }
            if (evt.type === "error") {
              throw new Error(evt.error || "Streaming request failed.");
            }
            return false;
          };

          streamingExtraTokens = continueOnly ? 0 : roughTokenCount(userInput) + 4;
          renderLive();
          renderContextSize(" (streaming)");
          while (true) {
            const { value, done } = await reader.read();
            if (done) {
              buffer += decoder.decode();
            } else {
              buffer += decoder.decode(value, { stream: true });
            }

            let newlineIndex = buffer.indexOf("\n");
            while (newlineIndex >= 0) {
              const line = buffer.slice(0, newlineIndex).trim();
              buffer = buffer.slice(newlineIndex + 1);
              if (line) {
                const evt = JSON.parse(line);
                const finished = await handleEvent(evt);
                if (finished) return;
              }
              newlineIndex = buffer.indexOf("\n");
            }

            if (done) {
              break;
            }
          }

          if (buffer.trim()) {
            const evt = JSON.parse(buffer.trim());
            const finished = await handleEvent(evt);
            if (finished) return;
          }
          throw new Error("Stream ended before completion event.");
        } catch (err) {
          if (err && err.name === "AbortError") {
            await persistAbortedStream();
            return { aborted: true };
          }
          throw err;
        } finally {
          if (activeStreamController === controller) {
            activeStreamController = null;
          }
        }
      }

      async function refresh(preferredStateUUID = "", historyMode = "replace") {
        const hashStateUUID = preferredStateUUID || getHashStateUUID();
        let payload;

        if (hashStateUUID) {
          try {
            payload = await api(`/api/state?state_uuid=${encodeURIComponent(hashStateUUID)}`);
          } catch (_) {
            payload = await api("/api/state");
            setStatus("");
          }
        } else {
          payload = await api("/api/state");
        }

        cachedState = payload.state;
        parentUUID = payload.parent_state_uuid || null;
        childUUID = payload.child_state_uuid || null;
        prevSiblingUUID = payload.prev_sibling_uuid || null;
        nextSiblingUUID = payload.next_sibling_uuid || null;
        prevTurnUUID = payload.prev_turn_uuid || null;
        nextTurnUUID = payload.next_turn_uuid || null;
        $("nav-left").disabled = !prevSiblingUUID;
        $("nav-up").disabled = !parentUUID;
        $("nav-down").disabled = !childUUID;
        $("nav-right").disabled = !nextSiblingUUID;
        $("nav-turn-up").disabled = !prevTurnUUID;
        $("nav-turn-down").disabled = !nextTurnUUID;
        setHashStateUUID(payload.state_uuid, historyMode);
        renderMeta(payload);
        currentContextTokens = Number(payload.context_tokens_estimate);
        contextTokensExact = !!(cachedState.prompt_tokens);
        renderContextSize();
        renderToolList(cachedState.tools, cachedState.config.builtin_tools || {});
        renderChat(cachedState.history);

        $("base_url").value = cachedState.config.base_url;
        $("api_key").value = cachedState.config.api_key;
        $("workspace_path").value = cachedState.config.workspace_path || "";
        $("model").value = cachedState.config.model;
        const builtin = cachedState.config.builtin_tools || {};
        $("builtin_pwd").checked = Boolean(builtin.pwd);
        $("builtin_ls").checked = Boolean(builtin.ls);
        $("builtin_rg").checked = Boolean(builtin.rg);
        $("builtin_rg_files").checked = Boolean(builtin.rg_files);
        $("builtin_browse").checked = Boolean(builtin.browse || builtin.query || builtin.rust_ast_query);
        $("builtin_read_file").checked = Boolean(builtin.read_file);
        $("builtin_file_edit").checked = Boolean(builtin.file_edit);

        const mcpServers = cachedState.config.mcp_servers || {};
        if (Object.keys(mcpServers).length > 0) {
          await fetchMcpTools();
        } else {
          cachedMcpTools = {};
        }
        renderMcpList(mcpServers, cachedMcpTools);
      }

      let configSaveTimer = null;
      function gatherConfig() {
        return {
          base_url: $("base_url").value.trim(),
          api_key: $("api_key").value.trim(),
          workspace_path: $("workspace_path").value.trim(),
          model: $("model").value.trim(),
          builtin_tools: {
            pwd: $("builtin_pwd").checked,
            ls: $("builtin_ls").checked,
            rg: $("builtin_rg").checked,
            rg_files: $("builtin_rg_files").checked,
            browse: $("builtin_browse").checked,
            read_file: $("builtin_read_file").checked,
            file_edit: $("builtin_file_edit").checked
          }
        };
      }
      async function autoSaveConfig() {
        try {
          const payload = await api("/api/config", "POST", gatherConfig());
          await refresh(payload.state_uuid, "push");
          setStatus("");
        } catch (err) {
          setStatus(`Config error: ${err.message}`);
        }
      }
      function scheduleConfigSave() {
        if (configSaveTimer) clearTimeout(configSaveTimer);
        configSaveTimer = setTimeout(autoSaveConfig, 400);
      }

      $("config-form").addEventListener("submit", (event) => {
        event.preventDefault();
        autoSaveConfig();
      });
      for (const id of ["builtin_pwd", "builtin_ls", "builtin_rg", "builtin_rg_files", "builtin_browse", "builtin_read_file", "builtin_file_edit"]) {
        $(id).addEventListener("change", scheduleConfigSave);
      }
      for (const id of ["base_url", "api_key", "workspace_path", "model"]) {
        $(id).addEventListener("change", scheduleConfigSave);
      }

      $("tool-form").addEventListener("submit", async (event) => {
        event.preventDefault();
        try {
          const payload = await api("/api/tools", "POST", {
            name: $("tool_name").value.trim(),
            description: $("tool_description").value.trim(),
            parameters: $("tool_parameters").value,
            implementation_code: $("tool_code").value
          });
          await refresh(payload.state_uuid, "push");
          setStatus("");
        } catch (err) {
          setStatus(`Tool error: ${err.message}`);
        }
      });

      $("tool-list").addEventListener("click", async (event) => {
        const target = event.target;
        if (!(target instanceof HTMLElement)) return;
        const button = target.closest("button[data-tool-name]");
        if (!(button instanceof HTMLElement)) return;

        const encodedName = button.getAttribute("data-tool-name");
        if (!encodedName) return;
        const toolName = decodeURIComponent(encodedName);

        try {
