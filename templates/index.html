<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Minimal Tool Chat UI</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: "SF Mono", "Consolas", "Liberation Mono", monospace;
      }
      body {
        margin: 0;
        padding: 16px;
        background: #020617;
        color: #e5e7eb;
      }
      h1, h2 {
        margin: 0 0 10px 0;
      }
      .grid {
        display: grid;
        gap: 14px;
      }
      .card {
        background: #0f172a;
        border: 1px solid #334155;
        padding: 12px;
        border-radius: 8px;
      }
      label {
        display: block;
        margin: 6px 0;
      }
      input, textarea, button {
        width: 100%;
        box-sizing: border-box;
        font: inherit;
      }
      input, textarea {
        border: 1px solid #334155;
        border-radius: 6px;
        padding: 8px;
        background: #020617;
        color: #e5e7eb;
      }
      textarea {
        min-height: 120px;
      }
      button {
        border: 1px solid #475569;
        border-radius: 6px;
        background: #1e293b;
        color: #f8fafc;
        padding: 10px;
        cursor: pointer;
      }
      button.secondary {
        background: #0f172a;
        color: #e5e7eb;
      }
      .row {
        display: grid;
        gap: 8px;
        grid-template-columns: 1fr 1fr;
      }
      .checkbox-grid {
        display: grid;
        gap: 6px;
        margin-top: 8px;
        grid-template-columns: 1fr 1fr;
      }
      .checkbox-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 0;
      }
      .checkbox-row input {
        width: auto;
      }
      .mcp-server {
        border: 1px solid #334155;
        border-radius: 6px;
        padding: 8px;
        margin: 6px 0;
        background: #020617;
      }
      .mcp-server-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }
      .mcp-server-header strong {
        flex: 1;
      }
      .pill {
        display: inline-block;
        margin: 3px 6px 3px 0;
        border: 1px solid #334155;
        border-radius: 999px;
        padding: 2px 8px;
        font-size: 12px;
        background: #111827;
      }
      .tool-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin: 4px 0;
      }
      .tool-remove {
        width: auto;
        padding: 4px 8px;
        font-size: 12px;
        background: #7f1d1d;
        border-color: #991b1b;
      }
      pre {
        white-space: pre-wrap;
        word-break: break-word;
        border: 1px solid #334155;
        border-radius: 6px;
        background: #020617;
        padding: 8px;
      }
      #chat-log {
        max-height: 75vh;
        overflow-y: auto;
        border: 1px solid #334155;
        border-radius: 6px;
        background: #020617;
        padding: 6px;
      }
      .msg {
        border: 1px solid #1e293b;
        border-radius: 4px;
        margin: 3px 0;
        padding: 4px 8px;
      }
      .msg-label {
        font-size: 10px;
        color: #64748b;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .msg-body {
        margin: 2px 0 0 0;
        white-space: pre-wrap;
        word-break: break-word;
        border: none;
        background: transparent;
        padding: 0;
        font: inherit;
      }
      .msg-user { border-left: 3px solid #3b82f6; }
      .msg-assistant { border-left: 3px solid #22c55e; }
      .msg-thinking { border-left: 3px solid #6366f1; color: #64748b; font-style: italic; }
      .msg-tool-call { border-left: 3px solid #f59e0b; font-size: 12px; }
      .msg-tool { border-left: 3px solid #6b7280; font-size: 12px; }
      .msg-system { border-left: 3px solid #8b5cf6; }
      .msg-diff { margin: 4px 0; }
      .diff-file { font-size: 11px; color: #94a3b8; margin-bottom: 2px; }
      .diff-del, .diff-add {
        margin: 0;
        padding: 2px 6px;
        white-space: pre-wrap;
        word-break: break-word;
        font: inherit;
        border: none;
      }
      .diff-del { background: #1c0a0a; border-left: 2px solid #ef4444; color: #fca5a5; }
      .diff-add { background: #0a1c0a; border-left: 2px solid #22c55e; color: #86efac; }
      .msg-params { font-size: 11px; margin: 2px 0; white-space: pre-wrap; word-break: break-word; }
      .msg-raw { margin-top: 4px; }
      .msg-raw summary { font-size: 10px; color: #475569; cursor: pointer; }
      .msg-raw pre { margin: 2px 0 0 0; font-size: 11px; max-height: 200px; overflow-y: auto; }
      #send-btn {
        width: 36px;
        min-width: 36px;
        padding: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      details.card > summary {
        cursor: pointer;
        list-style: none;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      details.card > summary::before {
        content: "\25b6";
        font-size: 10px;
        transition: transform 0.15s;
      }
      details.card[open] > summary::before {
        transform: rotate(90deg);
      }
      details.card > summary h2 {
        margin: 0;
      }
      .meta {
        font-size: 12px;
      }
      .nav-bar {
        display: flex;
        align-items: center;
        gap: 8px;
        position: sticky;
        top: 0;
        z-index: 100;
        background: #020617;
        padding: 8px 0;
        margin-bottom: 10px;
      }
      .nav-bar h1 {
        margin: 0;
        flex: 1;
      }
      .nav-btn {
        width: auto;
        padding: 4px 12px;
        font-size: 18px;
        line-height: 1;
        background: #1e293b;
        border: 1px solid #475569;
        border-radius: 6px;
        color: #f8fafc;
        cursor: pointer;
      }
      .nav-btn:disabled {
        opacity: 0.3;
        cursor: default;
      }
      .chat-input-bar {
        position: sticky;
        bottom: 0;
        z-index: 100;
        background: #020617;
        padding: 8px 0;
      }
      @media (max-width: 800px) {
        .row {
          grid-template-columns: 1fr;
        }
        .checkbox-grid {
          grid-template-columns: 1fr;
        }
        #chat-log {
          max-height: 60vh;
        }
      }
    </style>
  </head>
  <body>
    <div class="nav-bar">
      <button class="nav-btn" id="nav-left" type="button" disabled>&larr;</button>
      <button class="nav-btn" id="nav-up" type="button" disabled>&uarr;</button>
      <h1>Minimal Flask Tool Chat</h1>
      <button class="nav-btn" id="nav-down" type="button" disabled>&darr;</button>
      <button class="nav-btn" id="nav-right" type="button" disabled>&rarr;</button>
    </div>
    <div class="meta" id="meta"></div>
    <div class="grid">
      <details class="card" id="config-section">
        <summary><h2>Config</h2></summary>
        <form id="config-form">
          <label>
            Base URL
            <input id="base_url" required>
          </label>
          <label>
            API Key
            <input id="api_key" placeholder="optional">
          </label>
          <label>
            Workspace Path
            <input id="workspace_path" placeholder="/path/to/project">
          </label>
          <label>
            Model
            <input id="model" required>
          </label>
          <div class="checkbox-grid">
            <label class="checkbox-row">
              <input id="builtin_pwd" type="checkbox">
              <span>Enable pwd tool</span>
            </label>
            <label class="checkbox-row">
              <input id="builtin_ls" type="checkbox">
              <span>Enable ls tool</span>
            </label>
            <label class="checkbox-row">
              <input id="builtin_rg" type="checkbox">
              <span>Enable rg tool</span>
            </label>
            <label class="checkbox-row">
              <input id="builtin_rg_files" type="checkbox">
              <span>Enable rg_files tool</span>
            </label>
            <label class="checkbox-row">
              <input id="builtin_browse" type="checkbox">
              <span>Enable browse tool</span>
            </label>
            <label class="checkbox-row">
              <input id="builtin_read_file" type="checkbox">
              <span>Enable read_file tool</span>
            </label>
            <label class="checkbox-row">
              <input id="builtin_file_edit" type="checkbox">
              <span>Enable file_edit tool</span>
            </label>
          </div>
          <div class="meta"><code>browse</code> uses <code>path</code> as string-array segments.</div>
        </form>

        <h2 style="margin-top:12px">MCP Servers</h2>
        <div id="mcp-list"></div>
        <form id="mcp-add-form">
          <div class="row">
            <label>
              Name
              <input id="mcp_name" placeholder="verus" required>
            </label>
            <label>
              Command
              <input id="mcp_command" placeholder="/path/to/mcp-server" required>
            </label>
          </div>
          <label>
            Args (space-separated, optional)
            <input id="mcp_args" placeholder="">
          </label>
          <button type="submit">Add MCP Server</button>
        </form>
      </details>

      <details class="card" id="tools-section">
        <summary><h2>Tools</h2></summary>
        <div id="tool-list"></div>
        <form id="tool-form">
          <div class="row">
            <label>
              Tool Name
              <input id="tool_name" placeholder="square_the_number" required>
            </label>
            <label>
              Description
              <input id="tool_description" placeholder="output the square of the number." required>
            </label>
          </div>
          <label>
            Parameters JSON
            <textarea id="tool_parameters" required>{
  "type": "object",
  "required": ["input_num"],
  "properties": {
    "input_num": {
      "type": "number",
      "description": "input_num is a number that will be squared"
    }
  }
}</textarea>
          </label>
          <label>
            Python Tool Code
            <textarea id="tool_code" required>def square_the_number(input_num: float) -> dict:
    return {"result": input_num ** 2}</textarea>
          </label>
          <button type="submit">Add / Update Tool</button>
        </form>
      </details>

      <section class="card">
        <h2>Chat</h2>
        <button class="secondary" id="clear-history" type="button">Clear History</button>
        <div id="chat-log"></div>
        <div class="meta" id="chat-context-size">context_tokens~unknown</div>
      </section>

      <section class="card">
        <h2>Status</h2>
        <pre id="status"></pre>
      </section>
    </div>

    <div class="chat-input-bar">
      <form id="chat-form">
        <div class="row">
          <input id="chat_input" placeholder="message (empty = continue)">
          <button type="submit" id="send-btn" title="Send / Continue">
            <svg id="send-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            <svg id="stop-icon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="5" y="5" width="14" height="14" rx="2"/></svg>
          </button>
        </div>
      </form>
    </div>

    <script>
      const $ = (id) => document.getElementById(id);
      const statusEl = $("status");
      let cachedState = null;
      let isStreaming = false;
      let currentContextTokens = Number.NaN;
      let activeStreamController = null;
      let parentUUID = null;
      let childUUID = null;
      let prevSiblingUUID = null;
      let nextSiblingUUID = null;

      function setStatus(text) {
        statusEl.textContent = text;
      }

      async function api(path, method = "GET", body = null) {
        const res = await fetch(path, {
          method,
          headers: { "Content-Type": "application/json" },
          body: body ? JSON.stringify(body) : null
        });
        const payload = await res.json().catch(() => ({ ok: false, error: `HTTP ${res.status}` }));
        if (!res.ok || payload.ok === false) {
          throw new Error(payload.error || `HTTP ${res.status}`);
        }
        return payload;
      }

      async function readResponseError(res) {
        const text = await res.text();
        if (!text) return `HTTP ${res.status}`;
        try {
          const payload = JSON.parse(text);
          return payload.error || text;
        } catch (_) {
          return text;
        }
      }

      function truncateText(value, maxChars = 220) {
        const text = String(value ?? "");
        if (text.length <= maxChars) return text;
        return `${text.slice(0, maxChars)}...`;
      }

      function formatToolOutputValue(value) {
        if (value === null || value === undefined) {
          return "";
        }
        if (typeof value === "string") {
          return value;
        }
        if (typeof value === "object") {
          if (Object.prototype.hasOwnProperty.call(value, "output")) {
            return formatToolOutputValue(value.output);
          }
          if (Object.prototype.hasOwnProperty.call(value, "result")) {
            return formatToolOutputValue(value.result);
          }
          try {
            return JSON.stringify(value, null, 2);
          } catch (_) {
            return String(value);
          }
        }
        return String(value);
      }

      function formatToolOutput(content) {
        if (typeof content === "string") {
          try {
            return formatToolOutputValue(JSON.parse(content));
          } catch (_) {
            return content;
          }
        }
        return formatToolOutputValue(content);
      }

      function getHashStateUUID() {
        const raw = window.location.hash.replace(/^#/, "").trim();
        return raw || "";
      }

      function setHashStateUUID(stateUUID, mode = "replace", force = false) {
        if (!stateUUID) return;
        if (mode === "none") return;
        const nextHash = `#${stateUUID}`;
        if (window.location.hash === nextHash && !force) return;
        if (mode === "push") {
          history.pushState(null, "", nextHash);
          return;
        }
        history.replaceState(null, "", nextHash);
      }

      function buildPartialAssistantText(liveTimeline) {
        if (!Array.isArray(liveTimeline) || liveTimeline.length === 0) {
          return "";
        }
        const lines = [];
        liveTimeline.forEach((entry) => {
          if (!entry || typeof entry !== "object") return;
          if (entry.type === "reasoning") {
            lines.push(`[thinking] ${String(entry.text || "")}`);
            return;
          }
          if (entry.type === "assistant") {
            lines.push(String(entry.text || ""));
            return;
          }
          if (entry.type === "tool_call") {
            lines.push(`\n[tool_call] ${entry.tool_name}(${entry.arguments || "{}"})`);
            return;
          }
          if (entry.type === "tool_result") {
            lines.push("[tool]");
            lines.push(String(entry.output || ""));
          }
        });
        return lines.join("\n").trim();
      }

      async function persistAbortedStream() {
        const currentUUID = getHashStateUUID();
        if (currentUUID) {
          await refresh(currentUUID, "none");
        } else {
          await refresh("", "none");
        }
      }

      function renderMeta(payload) {
        $("meta").textContent = `state_uuid=${payload.state_uuid} | state_hash=${payload.state_hash} | events=${payload.event_count}`;
      }

      function renderContextSize(extra = "") {
        const base = Number.isFinite(currentContextTokens)
          ? `context_tokens~${currentContextTokens}`
          : "context_tokens~unknown";
        $("chat-context-size").textContent = `${base}${extra}`;
      }

      function chatLogIsNearBottom(thresholdPx = 8) {
        const el = $("chat-log");
        const distance = el.scrollHeight - el.scrollTop - el.clientHeight;
        return distance <= thresholdPx;
      }

      function setChatLogHtml(html) {
        const el = $("chat-log");
        const wasNearBottom = chatLogIsNearBottom();
        const prevScrollTop = el.scrollTop;
        // Snapshot which <details> are open (by index)
        const openSet = new Set();
        el.querySelectorAll("details.msg-raw").forEach((d, i) => {
          if (d.open) openSet.add(i);
        });
        el.innerHTML = html;
        // Restore open state
        if (openSet.size > 0) {
          el.querySelectorAll("details.msg-raw").forEach((d, i) => {
            if (openSet.has(i)) d.open = true;
          });
        }
        if (wasNearBottom) {
          el.scrollTop = el.scrollHeight;
          return;
        }
        const maxScrollTop = Math.max(0, el.scrollHeight - el.clientHeight);
        el.scrollTop = Math.min(prevScrollTop, maxScrollTop);
      }

      function msgBlock(cls, label, content) {
        return `<div class="msg ${cls}"><div class="msg-label">${escapeHtml(label)}</div><pre class="msg-body">${escapeHtml(content)}</pre></div>`;
      }

      function numberedLines(text, startLine, prefix) {
        const lines = text.split("\n");
        const pad = String(startLine + lines.length - 1).length;
        return lines.map((line, i) => {
          const num = String(startLine + i).padStart(pad, " ");
          return `${prefix}${num} | ${escapeHtml(line)}`;
        }).join("\n");
      }

      function prettyParams(argsStr) {
        try {
          const args = JSON.parse(argsStr);
          if (typeof args !== "object" || args === null || Array.isArray(args)) return null;
          const keys = Object.keys(args);
          if (keys.length === 0) return null;
          const parts = keys.map(k => {
            const v = args[k];
            const vs = typeof v === "string" ? v : JSON.stringify(v);
            return `<span style="color:#64748b">${escapeHtml(k)}:</span> ${escapeHtml(vs)}`;
          });
          return parts.join("  ");
        } catch(_) { return null; }
      }

      function renderToolCallHtml(toolName, argsStr, pending, startLine) {
        const eName = escapeHtml(toolName);
        if (pending) {
          const label = `calling ${eName}...`;
          return `<div class="msg msg-tool-call"><div class="msg-label">${label}</div><pre class="msg-body">${escapeHtml(argsStr)}</pre></div>`;
        }
        const label = `call ${eName}`;
        let bodyHtml = "";
        if (toolName === "file_edit") {
          try {
            const args = JSON.parse(argsStr);
            const sl = startLine || 1;
            if (args.create && args.new_string != null) {
              bodyHtml = `<div class="msg-diff">`;
              if (args.path) bodyHtml += `<div class="diff-file">${escapeHtml(args.path)} (new file)</div>`;
              bodyHtml += `<pre class="diff-add">${numberedLines(args.new_string, 1, "+")}</pre></div>`;
            } else if (args.old_string != null && args.new_string != null) {
              bodyHtml = `<div class="msg-diff">`;
              if (args.path) bodyHtml += `<div class="diff-file">${escapeHtml(args.path)}${startLine ? ":"+sl : ""}</div>`;
              bodyHtml += `<pre class="diff-del">${numberedLines(args.old_string, sl, "-")}</pre>`;
              bodyHtml += `<pre class="diff-add">${numberedLines(args.new_string, sl, "+")}</pre></div>`;
            }
          } catch (_) {}
        } else {
          const pretty = prettyParams(argsStr);
          if (pretty) {
            bodyHtml = `<div class="msg-params">${pretty}</div>`;
          }
        }
        const rawDetails = `<details class="msg-raw"><summary>json</summary><pre class="msg-body">${escapeHtml(argsStr)}</pre></details>`;
        return `<div class="msg msg-tool-call"><div class="msg-label">${label}</div>${bodyHtml}${rawDetails}</div>`;
      }

      function extractStartLine(content) {
        try {
          const obj = typeof content === "string" ? JSON.parse(content) : content;
          if (obj && typeof obj === "object" && typeof obj.start_line === "number") return obj.start_line;
        } catch(_) {}
        return null;
      }

      function historyToHtml(history) {
        if (!history || history.length === 0) return "";
        const blocks = [];
        // Build a map from tool_call_id to start_line from tool result messages
        const startLineMap = {};
        history.forEach((msg) => {
          if (msg.role === "tool" && msg.tool_call_id) {
            const sl = extractStartLine(msg.content);
            if (sl != null) startLineMap[msg.tool_call_id] = sl;
          }
        });
        history.forEach((msg) => {
          if (msg.role === "tool") {
            blocks.push(msgBlock("msg-tool", "tool", formatToolOutput(msg.content)));
            return;
          }
          if (msg.reasoning_content) {
            const rc = typeof msg.reasoning_content === "string" ? msg.reasoning_content : JSON.stringify(msg.reasoning_content);
            blocks.push(msgBlock("msg-thinking", "thinking", rc));
          }
          const content = typeof msg.content === "string" ? msg.content : JSON.stringify(msg.content);
          blocks.push(msgBlock(`msg-${msg.role}`, msg.role, content));
          if (msg.tool_calls) {
            msg.tool_calls.forEach((tc) => {
              const sl = tc.id ? startLineMap[tc.id] : null;
              blocks.push(renderToolCallHtml(tc.function.name, tc.function.arguments || "{}", false, sl));
            });
          }
        });
        return blocks.join("");
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function renderToolList(tools, builtinTools) {
        const names = Object.keys(tools);
        const enabledBuiltins = Object.entries(builtinTools || {})
          .filter(([, enabled]) => Boolean(enabled))
          .map(([name]) => name);

        if (names.length === 0 && enabledBuiltins.length === 0) {
          $("tool-list").innerHTML = "<p>No tools added yet.</p>";
          return;
        }

        const customHtml = names
          .map((name) => {
            const escapedName = escapeHtml(name);
            const encodedName = encodeURIComponent(name);
            return `<div class="tool-row"><span class="pill">${escapedName}</span><button class="tool-remove" type="button" data-tool-name="${encodedName}">Remove</button></div>`;
          })
          .join("");

        const builtinHtml = enabledBuiltins
          .map((name) => `<span class="pill">${escapeHtml(name)} (builtin)</span>`)
          .join("");

        $("tool-list").innerHTML = customHtml + builtinHtml;
      }

      let cachedMcpTools = {};

      function renderMcpList(mcpServers, mcpToolsInfo) {
        const container = $("mcp-list");
        const serverNames = Object.keys(mcpServers || {});
        if (serverNames.length === 0) {
          container.innerHTML = "<p>No MCP servers configured.</p>";
          return;
        }
        let html = "";
        for (const srvName of serverNames) {
          const srv = mcpServers[srvName];
          const info = mcpToolsInfo[srvName] || {};
          const toolFlags = srv.tools || {};
          const escapedName = escapeHtml(srvName);
          const encodedName = encodeURIComponent(srvName);

          html += `<div class="mcp-server">`;
          html += `<div class="mcp-server-header">`;
          html += `<strong>${escapedName}</strong>`;
          html += `<code style="font-size:11px">${escapeHtml(srv.command)}</code>`;
          html += `<button class="tool-remove mcp-remove" type="button" data-mcp-name="${encodedName}">Remove</button>`;
          html += `</div>`;

          if (info.error) {
            html += `<div class="meta" style="color:#f87171">${escapeHtml(info.error)}</div>`;
          } else if (info.tools && info.tools.length > 0) {
            html += `<div class="checkbox-grid">`;
            for (const t of info.tools) {
              const tName = t.name;
              const checked = Object.keys(toolFlags).length === 0 ? true : toolFlags[tName] !== false;
              const cbId = `mcp_tool_${encodedName}_${encodeURIComponent(tName)}`;
              html += `<label class="checkbox-row">`;
              html += `<input type="checkbox" id="${cbId}" data-mcp-server="${encodedName}" data-mcp-tool="${encodeURIComponent(tName)}" ${checked ? "checked" : ""}>`;
              html += `<span>${escapeHtml(tName)}</span>`;
              html += `</label>`;
            }
            html += `</div>`;
          } else {
            html += `<div class="meta">No tools discovered yet.</div>`;
          }
          html += `</div>`;
        }
        container.innerHTML = html;
      }

      async function fetchMcpTools() {
        try {
          const payload = await api("/api/mcp_tools");
          cachedMcpTools = payload.mcp_tools || {};
        } catch (_) {
          cachedMcpTools = {};
        }
      }

      function renderChat(history) {
        if (!history || history.length === 0) {
          setChatLogHtml('<div class="meta">No messages yet.</div>');
          return;
        }
        setChatLogHtml(historyToHtml(history));
      }

      async function streamChatRequest(userInput, continueOnly = false) {
        const controller = new AbortController();
        activeStreamController = controller;
        let liveTimeline = [];
        try {
          const res = await fetch("/api/chat/stream", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: userInput, continue: continueOnly, state_uuid: getHashStateUUID() }),
            signal: controller.signal
          });
          if (!res.ok) {
            throw new Error(await readResponseError(res));
          }
          if (!res.body) {
            throw new Error("Streaming response body not available in this browser.");
          }

          const reader = res.body.getReader();
          const decoder = new TextDecoder();
          let buffer = "";
          const baseHistory = Array.isArray(cachedState?.history) ? cachedState.history : [];
          liveTimeline = [];

          const addDelta = (text) => {
            const piece = String(text || "");
            const last = liveTimeline[liveTimeline.length - 1];
            if (last && last.type === "assistant") {
              last.text += piece;
            } else {
              liveTimeline.push({ type: "assistant", text: piece });
            }
          };

          const addReasoning = (text) => {
            const piece = String(text || "");
            const last = liveTimeline[liveTimeline.length - 1];
            if (last && last.type === "reasoning") {
              last.text += piece;
            } else {
              liveTimeline.push({ type: "reasoning", text: piece });
            }
          };

          let mergePrefix = "";
          let mergeBaseHistory = baseHistory;
          if (continueOnly && baseHistory.length > 0 && baseHistory[baseHistory.length - 1].role === "assistant") {
            mergePrefix = baseHistory[baseHistory.length - 1].content || "";
            mergeBaseHistory = baseHistory.slice(0, -1);
          }

          const renderLive = () => {
            let html = historyToHtml(mergeBaseHistory);
            if (!continueOnly) {
              html += msgBlock("msg-user", "user", userInput);
            }
            if (liveTimeline.length === 0) {
              html += msgBlock("msg-assistant", "assistant", mergePrefix + "...");
            } else {
              let firstAssistant = true;
              liveTimeline.forEach((entry) => {
                if (entry.type === "reasoning") {
                  html += msgBlock("msg-thinking", "thinking", entry.text || "...");
                } else if (entry.type === "assistant") {
                  const prefix = firstAssistant ? mergePrefix : "";
                  firstAssistant = false;
                  html += msgBlock("msg-assistant", "assistant", prefix + (entry.text || "..."));
                } else if (entry.type === "tool_call") {
                  html += renderToolCallHtml(entry.tool_name, entry.arguments || "{}", !!entry.pending, entry.startLine);
                } else if (entry.type === "tool_result") {
                  html += msgBlock("msg-tool", "tool", entry.output || "");
                }
              });
            }
            setChatLogHtml(html);
          };

          const handleEvent = async (evt) => {
            if (!evt || typeof evt !== "object") return false;
            if (evt.type === "snapshot") {
              setHashStateUUID(evt.state_uuid, "replace");
              return false;
            }
            if (evt.type === "reasoning_delta") {
              addReasoning(evt.content);
              renderLive();
              return false;
            }
            if (evt.type === "delta") {
              addDelta(evt.content);
              renderLive();
              return false;
            }
            if (evt.type === "tool_call_start") {
              liveTimeline.push({
                type: "tool_call",
                tool_name: evt.tool_name,
                arguments: "",
                pending: true,
                tcIndex: evt.index ?? 0
              });
              renderLive();
              return false;
            }
            if (evt.type === "tool_call_delta") {
              const entry = liveTimeline.findLast(
                (e) => e.type === "tool_call" && e.pending && e.tcIndex === (evt.index ?? 0)
              );
              if (entry) {
                entry.arguments += evt.arguments_delta || "";
              }
              renderLive();
              return false;
            }
            if (evt.type === "tool_call") {
              const pending = liveTimeline.findLast(
                (e) => e.type === "tool_call" && e.pending && e.tool_name === evt.tool_name
              );
              if (pending) {
                pending.arguments = evt.arguments || "{}";
                pending.pending = false;
              } else {
                liveTimeline.push({
                  type: "tool_call",
                  tool_name: evt.tool_name,
                  arguments: evt.arguments || "{}"
                });
              }
              renderLive();
              return false;
            }
            if (evt.type === "tool_result") {
              const output = formatToolOutput(evt.result ?? {});
              // Extract start_line and attach to the most recent file_edit tool call
              const sl = extractStartLine(evt.result);
              if (sl != null) {
                const tcEntry = liveTimeline.findLast(e => e.type === "tool_call" && e.tool_name === "file_edit");
                if (tcEntry) tcEntry.startLine = sl;
              }
              liveTimeline.push({
                type: "tool_result",
                output
              });
              renderLive();
              return false;
            }
            if (evt.type === "done") {
              // Commit the exact persisted snapshot hash for this completed message.
              setHashStateUUID(evt.state_uuid, "push");
              await refresh(evt.state_uuid, "none");
              setStatus("");
              return true;
            }
            if (evt.type === "error") {
              throw new Error(evt.error || "Streaming request failed.");
            }
            return false;
          };

          renderLive();
          renderContextSize(" (streaming)");
          while (true) {
            const { value, done } = await reader.read();
            if (done) {
              buffer += decoder.decode();
            } else {
              buffer += decoder.decode(value, { stream: true });
            }

            let newlineIndex = buffer.indexOf("\n");
            while (newlineIndex >= 0) {
              const line = buffer.slice(0, newlineIndex).trim();
              buffer = buffer.slice(newlineIndex + 1);
              if (line) {
                const evt = JSON.parse(line);
                const finished = await handleEvent(evt);
                if (finished) return;
              }
              newlineIndex = buffer.indexOf("\n");
            }

            if (done) {
              break;
            }
          }

          if (buffer.trim()) {
            const evt = JSON.parse(buffer.trim());
            const finished = await handleEvent(evt);
            if (finished) return;
          }
          throw new Error("Stream ended before completion event.");
        } catch (err) {
          if (err && err.name === "AbortError") {
            await persistAbortedStream();
            return { aborted: true };
          }
          throw err;
        } finally {
          if (activeStreamController === controller) {
            activeStreamController = null;
          }
        }
      }

      async function refresh(preferredStateUUID = "", historyMode = "replace") {
        const hashStateUUID = preferredStateUUID || getHashStateUUID();
        let payload;

        if (hashStateUUID) {
          try {
            payload = await api(`/api/state?state_uuid=${encodeURIComponent(hashStateUUID)}`);
          } catch (_) {
            payload = await api("/api/state");
            setStatus("");
          }
        } else {
          payload = await api("/api/state");
        }

        cachedState = payload.state;
        parentUUID = payload.parent_state_uuid || null;
        childUUID = payload.child_state_uuid || null;
        prevSiblingUUID = payload.prev_sibling_uuid || null;
        nextSiblingUUID = payload.next_sibling_uuid || null;
        $("nav-left").disabled = !prevSiblingUUID;
        $("nav-up").disabled = !parentUUID;
        $("nav-down").disabled = !childUUID;
        $("nav-right").disabled = !nextSiblingUUID;
        setHashStateUUID(payload.state_uuid, historyMode);
        renderMeta(payload);
        currentContextTokens = Number(payload.context_tokens_estimate);
        renderContextSize();
        renderToolList(cachedState.tools, cachedState.config.builtin_tools || {});
        renderChat(cachedState.history);

        $("base_url").value = cachedState.config.base_url;
        $("api_key").value = cachedState.config.api_key;
        $("workspace_path").value = cachedState.config.workspace_path || "";
        $("model").value = cachedState.config.model;
        const builtin = cachedState.config.builtin_tools || {};
        $("builtin_pwd").checked = Boolean(builtin.pwd);
        $("builtin_ls").checked = Boolean(builtin.ls);
        $("builtin_rg").checked = Boolean(builtin.rg);
        $("builtin_rg_files").checked = Boolean(builtin.rg_files);
        $("builtin_browse").checked = Boolean(builtin.browse || builtin.query || builtin.rust_ast_query);
        $("builtin_read_file").checked = Boolean(builtin.read_file);
        $("builtin_file_edit").checked = Boolean(builtin.file_edit);

        const mcpServers = cachedState.config.mcp_servers || {};
        if (Object.keys(mcpServers).length > 0) {
          await fetchMcpTools();
        } else {
          cachedMcpTools = {};
        }
        renderMcpList(mcpServers, cachedMcpTools);
      }

      let configSaveTimer = null;
      function gatherConfig() {
        return {
          base_url: $("base_url").value.trim(),
          api_key: $("api_key").value.trim(),
          workspace_path: $("workspace_path").value.trim(),
          model: $("model").value.trim(),
          builtin_tools: {
            pwd: $("builtin_pwd").checked,
            ls: $("builtin_ls").checked,
            rg: $("builtin_rg").checked,
            rg_files: $("builtin_rg_files").checked,
            browse: $("builtin_browse").checked,
            read_file: $("builtin_read_file").checked,
            file_edit: $("builtin_file_edit").checked
          }
        };
      }
      async function autoSaveConfig() {
        try {
          const payload = await api("/api/config", "POST", gatherConfig());
          await refresh(payload.state_uuid, "push");
          setStatus("");
        } catch (err) {
          setStatus(`Config error: ${err.message}`);
        }
      }
      function scheduleConfigSave() {
        if (configSaveTimer) clearTimeout(configSaveTimer);
        configSaveTimer = setTimeout(autoSaveConfig, 400);
      }

      $("config-form").addEventListener("submit", (event) => {
        event.preventDefault();
        autoSaveConfig();
      });
      for (const id of ["builtin_pwd", "builtin_ls", "builtin_rg", "builtin_rg_files", "builtin_browse", "builtin_read_file", "builtin_file_edit"]) {
        $(id).addEventListener("change", scheduleConfigSave);
      }
      for (const id of ["base_url", "api_key", "workspace_path", "model"]) {
        $(id).addEventListener("change", scheduleConfigSave);
      }

      $("tool-form").addEventListener("submit", async (event) => {
        event.preventDefault();
        try {
          const payload = await api("/api/tools", "POST", {
            name: $("tool_name").value.trim(),
            description: $("tool_description").value.trim(),
            parameters: $("tool_parameters").value,
            implementation_code: $("tool_code").value
          });
          await refresh(payload.state_uuid, "push");
          setStatus("");
        } catch (err) {
          setStatus(`Tool error: ${err.message}`);
        }
      });

      $("tool-list").addEventListener("click", async (event) => {
        const target = event.target;
        if (!(target instanceof HTMLElement)) return;
        const button = target.closest("button[data-tool-name]");
        if (!(button instanceof HTMLElement)) return;

        const encodedName = button.getAttribute("data-tool-name");
        if (!encodedName) return;
        const toolName = decodeURIComponent(encodedName);

        try {
          const payload = await api(`/api/tools/${encodeURIComponent(toolName)}`, "DELETE");
          await refresh(payload.state_uuid, "push");
          setStatus("");
        } catch (err) {
          setStatus(`Remove error: ${err.message}`);
        }
      });

      $("mcp-add-form").addEventListener("submit", async (event) => {
        event.preventDefault();
        const name = $("mcp_name").value.trim();
        const command = $("mcp_command").value.trim();
        const argsRaw = $("mcp_args").value.trim();
        const args = argsRaw ? argsRaw.split(/\s+/) : [];
        if (!name || !command) return;
        try {
          const payload = await api("/api/mcp_servers", "POST", { name, command, args });
          $("mcp_name").value = "";
          $("mcp_command").value = "";
          $("mcp_args").value = "";
          await refresh(payload.state_uuid, "push");
          setStatus("");
        } catch (err) {
          setStatus(`MCP error: ${err.message}`);
        }
      });

      $("mcp-list").addEventListener("click", async (event) => {
        const target = event.target;
        if (!(target instanceof HTMLElement)) return;

        const removeBtn = target.closest("button[data-mcp-name]");
        if (removeBtn instanceof HTMLElement) {
          const encodedName = removeBtn.getAttribute("data-mcp-name");
          if (!encodedName) return;
          const srvName = decodeURIComponent(encodedName);
          try {
            const payload = await api(`/api/mcp_servers/${encodeURIComponent(srvName)}`, "DELETE");
            await refresh(payload.state_uuid, "push");
            setStatus("");
          } catch (err) {
            setStatus(`MCP remove error: ${err.message}`);
          }
          return;
        }
      });

      $("mcp-list").addEventListener("change", async (event) => {
        const target = event.target;
        if (!(target instanceof HTMLInputElement) || target.type !== "checkbox") return;
        const srvNameEnc = target.getAttribute("data-mcp-server");
        const toolNameEnc = target.getAttribute("data-mcp-tool");
        if (!srvNameEnc || !toolNameEnc) return;
        const srvName = decodeURIComponent(srvNameEnc);
        const toolName = decodeURIComponent(toolNameEnc);
        const mcpServers = cachedState?.config?.mcp_servers || {};
        const srv = mcpServers[srvName];
        if (!srv) return;

        const toolFlags = Object.assign({}, srv.tools || {});
        const allToolNames = (cachedMcpTools[srvName]?.tools || []).map(t => t.name);
        if (Object.keys(toolFlags).length === 0) {
          for (const tn of allToolNames) toolFlags[tn] = true;
        }
        toolFlags[toolName] = target.checked;

        try {
          const payload = await api("/api/mcp_servers", "POST", {
            name: srvName,
            command: srv.command,
            args: srv.args || [],
            env: srv.env || {},
            enabled: srv.enabled !== false,
            tools: toolFlags
          });
          await refresh(payload.state_uuid, "push");
          setStatus("");
        } catch (err) {
          setStatus(`MCP tool toggle error: ${err.message}`);
        }
      });

      function setStreamingUI(on) {
        isStreaming = on;
        $("send-icon").style.display = on ? "none" : "";
        $("stop-icon").style.display = on ? "" : "none";
      }

      $("chat-form").addEventListener("submit", async (event) => {
        event.preventDefault();
        if (isStreaming) {
          if (activeStreamController) {
            setStatus("");
            activeStreamController.abort();
          }
          return;
        }
        const input = $("chat_input").value.trim();
        const continueOnly = !input;
        $("chat_input").value = "";
        setStatus("streaming");
        setStreamingUI(true);
        try {
          await streamChatRequest(input, continueOnly);
        } catch (err) {
          setStatus(`${err.message}`);
        } finally {
          setStreamingUI(false);
          renderContextSize();
        }
      });

      $("clear-history").addEventListener("click", async () => {
        try {
          const payload = await api("/api/history/clear", "POST", { state_uuid: getHashStateUUID() });
          await refresh(payload.state_uuid, "push");
          setStatus("");
        } catch (err) {
          setStatus(`Clear error: ${err.message}`);
        }
      });

      $("nav-left").addEventListener("click", () => {
        if (prevSiblingUUID) {
          setHashStateUUID(prevSiblingUUID, "push");
          refresh(prevSiblingUUID, "none").catch((err) => setStatus(`Nav error: ${err.message}`));
        }
      });

      $("nav-right").addEventListener("click", () => {
        if (nextSiblingUUID) {
          setHashStateUUID(nextSiblingUUID, "push");
          refresh(nextSiblingUUID, "none").catch((err) => setStatus(`Nav error: ${err.message}`));
        }
      });

      $("nav-up").addEventListener("click", async () => {
        if (!parentUUID) return;
        const currentUUID = getHashStateUUID();
        if (currentUUID) {
          try {
            await api("/api/state/visit_child", "POST", { parent: parentUUID, child: currentUUID });
          } catch (_) {}
        }
        setHashStateUUID(parentUUID, "push");
        refresh(parentUUID, "none").catch((err) => setStatus(`Nav error: ${err.message}`));
      });

      $("nav-down").addEventListener("click", () => {
        if (childUUID) {
          setHashStateUUID(childUUID, "push");
          refresh(childUUID, "none").catch((err) => setStatus(`Nav error: ${err.message}`));
        }
      });

      window.addEventListener("hashchange", () => {
        refresh("", "none").catch((err) => setStatus(`Hash error: ${err.message}`));
      });

      window.addEventListener("popstate", () => {
        refresh("", "none").catch((err) => setStatus(`History error: ${err.message}`));
      });

      refresh().catch((err) => setStatus(`Startup error: ${err.message}`));
    </script>
  </body>
</html>
