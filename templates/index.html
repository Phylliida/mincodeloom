          const payload = await api(`/api/tools/${encodeURIComponent(toolName)}`, "DELETE");
          await refresh(payload.state_uuid, "push");
          setStatus("");
        } catch (err) {
          setStatus(`Remove error: ${err.message}`);
        }
      });

      $("mcp-add-form").addEventListener("submit", async (event) => {
        event.preventDefault();
        const name = $("mcp_name").value.trim();
        const command = $("mcp_command").value.trim();
        const argsRaw = $("mcp_args").value.trim();
        const args = argsRaw ? argsRaw.split(/\s+/) : [];
        if (!name || !command) return;
        try {
          const payload = await api("/api/mcp_servers", "POST", { name, command, args });
          $("mcp_name").value = "";
          $("mcp_command").value = "";
          $("mcp_args").value = "";
          await refresh(payload.state_uuid, "push");
          setStatus("");
        } catch (err) {
          setStatus(`MCP error: ${err.message}`);
        }
      });

      $("mcp-list").addEventListener("click", async (event) => {
        const target = event.target;
        if (!(target instanceof HTMLElement)) return;

        const removeBtn = target.closest("button[data-mcp-name]");
        if (removeBtn instanceof HTMLElement) {
          const encodedName = removeBtn.getAttribute("data-mcp-name");
          if (!encodedName) return;
          const srvName = decodeURIComponent(encodedName);
          try {
            const payload = await api(`/api/mcp_servers/${encodeURIComponent(srvName)}`, "DELETE");
            await refresh(payload.state_uuid, "push");
            setStatus("");
          } catch (err) {
            setStatus(`MCP remove error: ${err.message}`);
          }
          return;
        }
      });

      $("mcp-list").addEventListener("change", async (event) => {
        const target = event.target;
        if (!(target instanceof HTMLInputElement) || target.type !== "checkbox") return;
        const srvNameEnc = target.getAttribute("data-mcp-server");
        const toolNameEnc = target.getAttribute("data-mcp-tool");
        if (!srvNameEnc || !toolNameEnc) return;
        const srvName = decodeURIComponent(srvNameEnc);
        const toolName = decodeURIComponent(toolNameEnc);
        const mcpServers = cachedState?.config?.mcp_servers || {};
        const srv = mcpServers[srvName];
        if (!srv) return;

        const toolFlags = Object.assign({}, srv.tools || {});
        const allToolNames = (cachedMcpTools[srvName]?.tools || []).map(t => t.name);
        if (Object.keys(toolFlags).length === 0) {
          for (const tn of allToolNames) toolFlags[tn] = true;
        }
        toolFlags[toolName] = target.checked;

        try {
          const payload = await api("/api/mcp_servers", "POST", {
            name: srvName,
            command: srv.command,
            args: srv.args || [],
            env: srv.env || {},
            enabled: srv.enabled !== false,
            tools: toolFlags
          });
          await refresh(payload.state_uuid, "push");
          setStatus("");
        } catch (err) {
          setStatus(`MCP tool toggle error: ${err.message}`);
        }
      });

      function setStreamingUI(on) {
        isStreaming = on;
        $("send-icon").style.display = on ? "none" : "";
        $("stop-icon").style.display = on ? "" : "none";
      }

      const AUTO_COMPACT_THRESHOLD = 70000;

      async function doCompact(statusLabel = "compacting...") {
        setStatus(statusLabel);
        const res = await fetch("/api/compact", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ state_uuid: getHashStateUUID() }),
        });
        if (!res.ok) {
          const err = await readResponseError(res);
          throw new Error(err);
        }
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";
        let thinkingText = "";
        let summaryText = "";
        let donePayload = null;

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split("\n");
          buffer = lines.pop() || "";
          for (const line of lines) {
            if (!line.trim()) continue;
            let evt;
            try { evt = JSON.parse(line); } catch(_) { continue; }
            if (evt.type === "reasoning_delta") {
              thinkingText += evt.content;
              let html = msgBlock("msg-thinking", "thinking", thinkingText);
              if (summaryText) html += msgBlock("msg-system", "compact summary", summaryText + "...");
              setChatLogHtml(html);
            } else if (evt.type === "delta") {
              summaryText += evt.content;
              let html = "";
              if (thinkingText) html += msgBlock("msg-thinking", "thinking", thinkingText);
              html += msgBlock("msg-system", "compact summary", summaryText);
              setChatLogHtml(html);
            } else if (evt.type === "usage") {
              currentContextTokens = evt.prompt_tokens || evt.total_tokens;
              contextTokensExact = !!evt.prompt_tokens;
              streamingExtraTokens = 0;
              renderContextSize(" (compacting)");
            } else if (evt.type === "done") {
              donePayload = evt;
            } else if (evt.type === "error") {
              throw new Error(evt.error);
            }
          }
        }
        if (donePayload) {
          await refresh(donePayload.state_uuid, "push");
          setStatus("compacted");
        }
      }

      $("chat-form").addEventListener("submit", async (event) => {
        event.preventDefault();
        if (isStreaming) {
          if (activeStreamController) {
            setStatus("");
            activeStreamController.abort();
          }
          return;
        }
        const input = $("chat_input").value.trim();
        const continueOnly = !input;
        $("chat_input").value = "";
        $("chat_input").style.height = "auto";
        setStatus("connecting...");
        setStreamingUI(true);
        try {
          await streamChatRequest(input, continueOnly);

          // Auto-compact + continue if over threshold
          if (Number.isFinite(currentContextTokens) && currentContextTokens >= AUTO_COMPACT_THRESHOLD) {
            await doCompact("auto-compacting (>70k tokens)...");
            // Auto-continue after compaction
            await streamChatRequest("", true);
          }
        } catch (err) {
          setStatus(`${err.message}`);
        } finally {
          setStreamingUI(false);
          renderContextSize();
        }
      });

      // Auto-resize textarea
      $("chat_input").addEventListener("input", function() {
        this.style.height = "auto";
        this.style.height = this.scrollHeight + "px";
      });
      // Submit on Enter, newline on Shift+Enter
      $("chat_input").addEventListener("keydown", function(e) {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          $("chat-form").requestSubmit();
        }
      });

      $("compact-btn").addEventListener("click", async () => {
        try {
          await doCompact();
        } catch (err) {
          setStatus(`Compact error: ${err.message}`);
        }
      });

      $("clear-history").addEventListener("click", async () => {
        try {
          const payload = await api("/api/history/clear", "POST", { state_uuid: getHashStateUUID() });
          await refresh(payload.state_uuid, "push");
          setStatus("");
        } catch (err) {
          setStatus(`Clear error: ${err.message}`);
        }
      });

      $("nav-left").addEventListener("click", () => {
        if (prevSiblingUUID) {
          setHashStateUUID(prevSiblingUUID, "push");
          refresh(prevSiblingUUID, "none").catch((err) => setStatus(`Nav error: ${err.message}`));
        }
      });

      $("nav-right").addEventListener("click", () => {
        if (nextSiblingUUID) {
          setHashStateUUID(nextSiblingUUID, "push");
          refresh(nextSiblingUUID, "none").catch((err) => setStatus(`Nav error: ${err.message}`));
        }
      });

      $("nav-up").addEventListener("click", async () => {
        if (!parentUUID) return;
        const currentUUID = getHashStateUUID();
        if (currentUUID) {
          try {
            await api("/api/state/visit_child", "POST", { parent: parentUUID, child: currentUUID });
          } catch (_) {}
        }
        setHashStateUUID(parentUUID, "push");
        refresh(parentUUID, "none").catch((err) => setStatus(`Nav error: ${err.message}`));
      });

      $("nav-down").addEventListener("click", () => {
        if (childUUID) {
          setHashStateUUID(childUUID, "push");
          refresh(childUUID, "none").catch((err) => setStatus(`Nav error: ${err.message}`));
        }
      });

      $("nav-turn-up").addEventListener("click", () => {
        if (prevTurnUUID) {
          setHashStateUUID(prevTurnUUID, "push");
          refresh(prevTurnUUID, "none").catch((err) => setStatus(`Nav error: ${err.message}`));
        }
      });

      $("nav-turn-down").addEventListener("click", () => {
        if (nextTurnUUID) {
          setHashStateUUID(nextTurnUUID, "push");
          refresh(nextTurnUUID, "none").catch((err) => setStatus(`Nav error: ${err.message}`));
        }
      });

      window.addEventListener("hashchange", () => {
        refresh("", "none").catch((err) => setStatus(`Hash error: ${err.message}`));
      });

      window.addEventListener("popstate", () => {
        refresh("", "none").catch((err) => setStatus(`History error: ${err.message}`));
      });

      $("chat-log").addEventListener("scroll", () => {
        if (!vsActive) return;
        if (vsScrollRAF) return;
        vsScrollRAF = requestAnimationFrame(() => {
          vsScrollRAF = null;
          vsUpdate(false);
        });
      });

      $("virtual_scroll").addEventListener("change", () => {
        if (cachedState) renderChat(cachedState.history);
      });

      // Persist virtual scroll preference
      try {
        const savedVS = localStorage.getItem("virtualScroll");
        if (savedVS !== null) $("virtual_scroll").checked = savedVS === "true";
      } catch(_) {}
      $("virtual_scroll").addEventListener("change", () => {
        try { localStorage.setItem("virtualScroll", $("virtual_scroll").checked); } catch(_) {}
      });

      refresh().catch((err) => setStatus(`Startup error: ${err.message}`));
    </script>
  </body>
</html>
